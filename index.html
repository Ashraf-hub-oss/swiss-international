<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swiss International School</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for compiling JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase App -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      .glass-morphism {
        @apply bg-white/10 backdrop-blur-2xl backdrop-saturate-150 border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] relative overflow-hidden;
      }
      .glass-edge {
        @apply before:absolute before:inset-0 before:p-[1px] before:rounded-[inherit] before:bg-gradient-to-br before:from-white/60 before:to-transparent before:-z-10 before:pointer-events-none;
      }
      .glass-button {
        @apply bg-gradient-to-br from-white/30 to-white/10 backdrop-blur-md border border-white/40 shadow-[0_8px_16px_rgba(0,0,0,0.05)] hover:shadow-[0_12px_24px_rgba(0,0,0,0.1)] hover:from-white/40 hover:to-white/20 transition-all duration-500;
      }
      .fluid-gradient-text {
        @apply text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 via-blue-600 to-emerald-500 bg-[length:200%_auto] animate-gradient;
      }
    }

    @keyframes animateGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-gradient { animation: animateGradient 6s ease infinite; }

    @keyframes liquidBlob {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
      34% { transform: translate(4vw, -5vh) scale(1.05) rotate(5deg); border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
      67% { transform: translate(-3vw, 4vh) scale(0.95) rotate(-5deg); border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .liquid-bg-1 { animation: liquidBlob 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
    .liquid-bg-2 { animation: liquidBlob 25s infinite alternate-reverse cubic-bezier(0.4, 0, 0.2, 1); }
    .liquid-bg-3 { animation: liquidBlob 22s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); animation-delay: -5s; }
    .animate-float { animation: float 6s ease-in-out infinite; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.4); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.8); }
    
    .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(4px); } 
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
    }
  </style>
</head>
<body class="bg-[#eef2f6] text-slate-800 font-sans rtl overflow-x-hidden selection:bg-cyan-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, size = 24, className = "" }) => {
      const svgRef = useRef(null);
      useEffect(() => {
        if (svgRef.current && window.lucide) {
          const iconName = name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
          const iconData = window.lucide.icons[iconName];
          if (iconData) {
            const svgNode = window.lucide.createElement(iconData);
            svgNode.setAttribute('width', size);
            svgNode.setAttribute('height', size);
            svgNode.setAttribute('stroke-width', '2');
            if (className) svgNode.setAttribute('class', className);
            svgRef.current.innerHTML = '';
            svgRef.current.appendChild(svgNode);
          }
        }
      }, [name, size, className]);
      return <span ref={svgRef} className={`inline-flex items-center justify-center ${className}`}></span>;
    };

    // ==========================================
    // FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDBjYPF_M3Lb3Y4tct_x5kA-LBZocfEP2c",
      authDomain: "swiss-international-d6578.firebaseapp.com",
      databaseURL: "https://swiss-international-d6578-default-rtdb.firebaseio.com",
      projectId: "swiss-international-d6578",
      storageBucket: "swiss-international-d6578.appspot.com",
      messagingSenderId: "720440406051",
      appId: "1:720440406051:web:5aa7de314737ddc32b4196",
    };

    let auth = null;
    let db = null;

    try {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
      // تم إزالة db.enablePersistence() لأنها تسبب انهيار الكود في متصفحات الجوال و GitHub Pages
    } catch(e) { console.error("Firebase init error:", e); }
    
    // --- Global Constants & Mock Data ---
    const GRADES = ['الاول ابتدائي', 'الثاني ابتدائي', 'الثالث ابتدائي', 'الرابع ابتدائي', 'الخامس ابتدائي', 'السادس ابتدائي', 'الاول متوسط', 'الثاني متوسط', 'الثالث متوسط'];
    
    const glassContainer = "glass-morphism glass-edge rounded-[2rem]";
    const glassInputCls = "w-full bg-white/40 backdrop-blur-md border border-white/50 shadow-[inset_0_2px_8px_rgba(0,0,0,0.04)] rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-cyan-400/50 focus:bg-white/60 placeholder-slate-400 text-slate-800 font-bold transition-all duration-500 hover:bg-white/50";
    const glassBtnPrimary = "relative overflow-hidden bg-gradient-to-r from-cyan-400 via-blue-500 to-cyan-500 bg-[length:200%_auto] animate-gradient text-white font-black py-4 px-8 rounded-2xl transition-all duration-500 shadow-[0_8px_20px_rgba(6,182,212,0.3)] hover:shadow-[0_15px_30px_rgba(6,182,212,0.4)] hover:-translate-y-1 active:translate-y-0 active:scale-95 flex items-center justify-center gap-3";

    const DEFAULT_ACCOUNTS = [
      { id: 'Asad Amir', name: 'Asad Amir', role: 'superadmin', password: '0963249754' },
      { id: 'teacher1', name: 'أستاذ تجريبي', role: 'teacher', password: '1234' },
      { id: 'student1', name: 'طالب تجريبي', role: 'student', grade: 'الاول ابتدائي', password: '1234', completedLessons: [], quizScores: {} }
    ];
    
    const DEFAULT_SUBJECTS = [{ dbId: 'sub_1', name: 'الرياضيات', grade: 'الاول ابتدائي' }, { dbId: 'sub_2', name: 'لغتي الخالدة', grade: 'الاول ابتدائي' }];
    const DEFAULT_LESSONS = [{ dbId: 'les_1', subjectId: 'sub_1', grade: 'الاول ابتدائي', title: 'الجمع والطرح', type: 'video', link: '#' }];
    const DEFAULT_QUIZZES = [{ dbId: 'quiz_1', subjectId: 'sub_1', grade: 'الاول ابتدائي', title: 'اختبار الجمع السريع', questions: [{ q: 'كم ناتج 1+1؟', options: ['1', '2', '3'], correct: '2' }] }];
    const DEFAULT_NEWS = [{ dbId: 'news_1', title: 'مرحباً بكم في منصة Swiss School', content: 'المنصة تدعم الآن الوضع المحلي الهجين، ستعمل بياناتك حتى في حال انقطاع السيرفر.', author: 'نظام المنصة', createdAt: Date.now() }];

    // Helper: Local Storage Manager
    const getLocal = (key, defaultVal) => {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : defaultVal; } 
      catch(e) { return defaultVal; }
    };

    function App() {
      const [appUser, setAppUser] = useState(null);
      const [view, setView] = useState('dashboard');
      const [notification, setNotification] = useState(null);
      const [confirmAction, setConfirmAction] = useState(null);
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [isOnline, setIsOnline] = useState(false); // مؤشر حالة السيرفر

      // تحميل مبدئي من LocalStorage (الوضع المحلي) لمنع فقدان البيانات عند التحديث
      const [users, setUsers] = useState(() => getLocal('swiss_users', DEFAULT_ACCOUNTS));
      const [subjects, setSubjects] = useState(() => getLocal('swiss_subjects', DEFAULT_SUBJECTS));
      const [lessons, setLessons] = useState(() => getLocal('swiss_lessons', DEFAULT_LESSONS));
      const [quizzes, setQuizzes] = useState(() => getLocal('swiss_quizzes', DEFAULT_QUIZZES));
      const [messages, setMessages] = useState(() => getLocal('swiss_messages', []));
      const [news, setNews] = useState(() => getLocal('swiss_news', DEFAULT_NEWS));

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // حفظ تلقائي محلي (Backup) في حالة عدم وجود انترنت أو فشل Firebase
      useEffect(() => {
        if (!isOnline) {
          localStorage.setItem('swiss_users', JSON.stringify(users));
          localStorage.setItem('swiss_subjects', JSON.stringify(subjects));
          localStorage.setItem('swiss_lessons', JSON.stringify(lessons));
          localStorage.setItem('swiss_quizzes', JSON.stringify(quizzes));
          localStorage.setItem('swiss_messages', JSON.stringify(messages));
          localStorage.setItem('swiss_news', JSON.stringify(news));
        }
      }, [users, subjects, lessons, quizzes, messages, news, isOnline]);

      useEffect(() => {
        const savedUserId = localStorage.getItem('swiss_school_user_id');
        if (savedUserId) {
          const foundUser = getLocal('swiss_users', DEFAULT_ACCOUNTS).find(x => x.id === savedUserId);
          if (foundUser) setAppUser(foundUser);
        }

        if (!db || !auth) {
           showNotification("الخوادم غير متاحة، يعمل الموقع بالوضع المحلي", "error");
           return;
        }

        const unsubscribes = [];

        const setupListeners = async () => {
          try {
            await auth.signInAnonymously();
            setIsOnline(true);
            showNotification("متصل بالخادم السحابي بنجاح ✨");
            
            unsubscribes.push(
              db.collection('users').onSnapshot((snap) => {
                const dbUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const mergedUsers = [...dbUsers];
                for (const acc of DEFAULT_ACCOUNTS) if (!mergedUsers.find(x => x.id === acc.id)) mergedUsers.push(acc);
                setUsers(mergedUsers);
                if (savedUserId) {
                  const updatedMe = mergedUsers.find(x => x.id === savedUserId);
                  if (updatedMe) setAppUser(updatedMe);
                }
              })
            );

            unsubscribes.push(db.collection('subjects').onSnapshot(snap => setSubjects(snap.docs.map(d => ({ dbId: d.id, ...d.data() })))));
            unsubscribes.push(db.collection('lessons').orderBy('createdAt', 'desc').onSnapshot(snap => setLessons(snap.docs.map(d => ({ dbId: d.id, ...d.data() })))));
            unsubscribes.push(db.collection('quizzes').orderBy('createdAt', 'desc').onSnapshot(snap => setQuizzes(snap.docs.map(d => ({ dbId: d.id, ...d.data() })))));
            unsubscribes.push(db.collection('messages').orderBy('createdAt', 'asc').onSnapshot(snap => setMessages(snap.docs.map(d => ({ dbId: d.id, ...d.data() })))));
            unsubscribes.push(db.collection('news').orderBy('createdAt', 'desc').onSnapshot(snap => setNews(snap.docs.map(d => ({ dbId: d.id, ...d.data() })))));
            
          } catch (e) { 
            console.error("Firebase Auth/Connect Error:", e);
            setIsOnline(false);
            showNotification("فشل الاتصال بالسيرفر. تم تفعيل الحفظ المحلي التلقائي.", "error");
          }
        };

        setupListeners();
        return () => unsubscribes.forEach(unsub => unsub());
      }, []);

      const handleLogin = (id, password) => {
        const u = users.find(x => x.id === id && x.password === password);
        if (u) { setAppUser(u); localStorage.setItem('swiss_school_user_id', u.id); setView('dashboard'); showNotification(`أهلاً بك، ${u.name} ✨`); } 
        else { showNotification("بيانات الدخول غير صحيحة.", "error"); }
      };

      const handleRegisterStudent = async (id, password, grade) => {
        const u = users.find(x => x.id === id && x.role === 'student');
        if (u) {
          if (u.password) return showNotification("الحساب مفعل بالفعل، يرجى الدخول.", "error");
          const updatedUser = {...u, password, grade, status: 'active', completedLessons: [], quizScores: {}};
          try { 
            if (isOnline && db) await db.collection('users').doc(id).set(updatedUser, {merge: true}); 
            else setUsers(users.map(x => x.id === id ? updatedUser : x));
            setAppUser(updatedUser); localStorage.setItem('swiss_school_user_id', updatedUser.id); setView('dashboard'); showNotification("تم التفعيل بنجاح 🎉");
          } catch(e) { showNotification("خطأ في تفعيل الحساب.", "error"); }
        } else { showNotification("المعرف غير مسجل، راجع الإدارة.", "error"); }
      };

      const logout = () => { setAppUser(null); localStorage.removeItem('swiss_school_user_id'); setView('dashboard'); };

      const renderView = () => {
        switch (view) {
          case 'dashboard': return <Dashboard user={appUser} users={users} lessons={lessons} subjects={subjects} news={news} setNews={setNews} isOnline={isOnline} showNotification={showNotification} setConfirmAction={setConfirmAction} />;
          case 'library': return <LibraryManager user={appUser} subjects={subjects} setSubjects={setSubjects} lessons={lessons} setLessons={setLessons} quizzes={quizzes} setQuizzes={setQuizzes} isOnline={isOnline} showNotification={showNotification} setConfirmAction={setConfirmAction} />;
          case 'progress': return <ProgressDashboard users={users} lessons={lessons} user={appUser} />;
          case 'users': return <UsersManager users={users} setUsers={setUsers} isOnline={isOnline} showNotification={showNotification} setConfirmAction={setConfirmAction} />;
          default: return <Dashboard user={appUser} users={users} lessons={lessons} subjects={subjects} news={news} setNews={setNews} isOnline={isOnline} showNotification={showNotification} setConfirmAction={setConfirmAction} />;
        }
      };

      return (
        <div className="relative min-h-[100dvh] overflow-x-hidden font-sans">
          {notification && (
            <div className={`fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-4 rounded-2xl shadow-[0_20px_40px_rgba(0,0,0,0.15)] font-bold text-white transition-all animate-fade-in flex items-center gap-3 backdrop-blur-xl border ${notification.type === 'error' ? 'bg-rose-500/90 border-rose-400' : 'bg-emerald-500/90 border-emerald-400'}`}>
              {notification.type === 'error' ? <Icon name="alert-circle" size={24}/> : <Icon name="check-circle" size={24}/>}
              {notification.message}
            </div>
          )}

          <div className="fixed top-[-15%] left-[-15%] w-[70vw] h-[70vw] max-w-[900px] max-h-[900px] bg-cyan-300 mix-blend-multiply filter blur-[140px] opacity-[0.35] pointer-events-none liquid-bg-1"></div>
          <div className="fixed top-[10%] right-[-15%] w-[60vw] h-[80vw] max-w-[800px] max-h-[1000px] bg-blue-300 mix-blend-multiply filter blur-[140px] opacity-[0.35] pointer-events-none liquid-bg-2"></div>
          <div className="fixed bottom-[-20%] left-[10%] w-[80vw] h-[60vw] max-w-[1000px] max-h-[800px] bg-emerald-200 mix-blend-multiply filter blur-[140px] opacity-[0.25] pointer-events-none liquid-bg-3"></div>

          {!appUser ? (<AuthScreen onLogin={handleLogin} onRegister={handleRegisterStudent} isOnline={isOnline} />) : (
            <div className="flex h-[100dvh] relative z-10 p-3 md:p-6 gap-6 pb-24 md:pb-6">
              
              <div className="hidden md:block h-full">
                <Sidebar user={appUser} view={view} setView={setView} logout={logout} setIsChatOpen={setIsChatOpen} isOnline={isOnline} />
              </div>
              
              <main className={`flex-1 min-h-0 ${glassContainer} !overflow-y-auto flex flex-col relative custom-scrollbar`} style={{ overflowY: 'auto', overflowX: 'hidden' }}>
                <div className="md:hidden flex items-center justify-between p-5 border-b border-white/20 bg-white/10 sticky top-0 z-20 backdrop-blur-xl">
                   <div className="flex items-center gap-4">
                     <div className="relative">
                       <div className="w-12 h-12 bg-gradient-to-tr from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-white font-black shadow-lg shadow-cyan-500/30 text-xl border border-white/40">{appUser.name.charAt(0)}</div>
                       <div className={`absolute -bottom-1 -right-1 w-4 h-4 rounded-full border-2 border-white ${isOnline ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                     </div>
                     <div><h2 className="font-black text-sm text-slate-800 leading-tight">{appUser.name}</h2><span className="text-[11px] font-bold text-cyan-700 uppercase tracking-wide">{getRoleName(appUser.role)}</span></div>
                   </div>
                   <div className="flex items-center gap-2">
                     <button onClick={() => setIsChatOpen(true)} className="p-3 text-purple-600 bg-white/40 hover:bg-white rounded-2xl shadow-sm transition-all border border-white/50 relative">
                       <Icon name="message-circle" size={20} />
                     </button>
                     <button onClick={logout} className="p-3 text-slate-500 hover:text-red-500 bg-white/40 hover:bg-white rounded-2xl shadow-sm transition-all border border-white/50"><Icon name="log-out" size={20} /></button>
                   </div>
                </div>
                
                <div className="p-5 md:p-10 flex-1">{renderView()}</div>
              </main>

              <ChatDrawer isOpen={isChatOpen} onClose={() => setIsChatOpen(false)} user={appUser} messages={messages} setMessages={setMessages} isOnline={isOnline} />

              <div className="md:hidden fixed bottom-6 left-4 right-4 bg-white/40 backdrop-blur-[30px] border border-white/50 shadow-[0_20px_40px_rgba(0,0,0,0.1)] z-50 px-2 py-3 rounded-3xl flex justify-around items-center glass-edge">
                <MobileNavItem id="dashboard" icon={<Icon name="layout-dashboard" />} label="الرئيسية" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'student', 'management']} role={appUser.role} />
                <MobileNavItem id="library" icon={<Icon name="library" />} label="المكتبة" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'student']} role={appUser.role} />
                <MobileNavItem id="progress" icon={<Icon name="trending-up" />} label="التقييم" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'management']} role={appUser.role} />
                <MobileNavItem id="users" icon={<Icon name="users" />} label="الحسابات" currentView={view} setView={setView} allowed={['superadmin']} role={appUser.role} />
              </div>
            </div>
          )}

          {/* Confirm Modal */}
          {confirmAction && (
            <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-xl z-[100] flex items-center justify-center p-4 transition-all duration-500">
              <div className={`${glassContainer} p-10 max-w-sm w-full shadow-[0_30px_60px_rgba(0,0,0,0.2)] animate-fade-in`}>
                <div className="w-16 h-16 bg-rose-100/80 rounded-2xl flex items-center justify-center mx-auto mb-6 text-rose-500"><Icon name="alert-triangle" size={32}/></div>
                <h3 className="text-xl font-black text-slate-800 mb-8 text-center leading-relaxed">{confirmAction.message}</h3>
                <div className="flex gap-4">
                  <button className="flex-1 bg-gradient-to-r from-rose-500 to-red-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hover:-translate-y-1" onClick={() => { confirmAction.onConfirm(); setConfirmAction(null); }}>نعم، تأكيد</button>
                  <button className="flex-1 bg-white/50 hover:bg-white text-slate-700 font-bold py-4 rounded-2xl transition-all shadow-sm border border-white/60" onClick={() => setConfirmAction(null)}>إلغاء</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function MobileNavItem({ id, icon, label, currentView, setView, allowed, role }) {
      if (!allowed.includes(role)) return null;
      const isActive = currentView === id;
      return (
        <button onClick={() => setView(id)} className={`relative flex flex-col items-center justify-center w-16 h-14 rounded-2xl transition-all duration-500 overflow-hidden ${isActive ? 'text-cyan-700' : 'text-slate-500 hover:text-cyan-500'}`}>
          {isActive && <div className="absolute inset-0 bg-gradient-to-b from-white/60 to-white/10 rounded-2xl -z-10 shadow-[inset_0_2px_4px_rgba(255,255,255,0.8)] border border-white/40"></div>}
          <div className={`mb-1 transition-all duration-500 flex items-center justify-center ${isActive ? 'scale-110 -translate-y-1 filter drop-shadow-md' : ''}`}>{icon}</div>
          <span className={`text-[10px] font-black transition-all duration-500 ${isActive ? 'opacity-100 transform translate-y-0' : 'opacity-0 translate-y-2 absolute bottom-0'}`}>{label}</span>
        </button>
      );
    }

    // ==========================================
    // AUTH SCREEN
    // ==========================================
    function AuthScreen({ onLogin, onRegister, isOnline }) {
      const [isRegister, setIsRegister] = useState(false);
      const [id, setId] = useState(''); const [password, setPassword] = useState(''); const [grade, setGrade] = useState(GRADES[0]);
      return (
        <div className="min-h-[100dvh] flex flex-col items-center justify-center relative z-10 p-5 w-full">
          <div className={`${glassContainer} p-10 md:p-14 max-w-[460px] w-full relative animate-fade-in shadow-[0_30px_60px_rgba(0,0,0,0.1)]`}>
            {/* Status Indicator */}
            <div className={`absolute top-4 right-4 flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-full ${isOnline ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-rose-50 text-rose-600 border border-rose-100'}`}>
              <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></div>
              {isOnline ? 'السيرفر متصل' : 'الوضع المحلي'}
            </div>

            <div className="text-center mb-10 mt-4">
              <div className="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-gradient-to-tr from-white/90 to-white/30 mb-6 shadow-xl border border-white/80 transform rotate-3 animate-float text-cyan-500"><Icon name="graduation-cap" size={48} /></div>
              <h1 className="text-3xl md:text-4xl font-black fluid-gradient-text mb-3 tracking-tight">Swiss School</h1>
              <p className="text-slate-500 font-bold text-sm tracking-widest uppercase">البوابة التعليمية الذكية</p>
            </div>
            <div className="space-y-6">
              <div className="relative flex items-center"><span className="absolute right-5 text-slate-400"><Icon name="user" size={22} /></span><input type="text" className={glassInputCls + " pr-14"} placeholder="رقم الهوية (ID)" value={id} onChange={e => setId(e.target.value)} /></div>
              {isRegister && (<div className="relative flex items-center"><span className="absolute right-5 text-slate-400"><Icon name="layers" size={22} /></span><select className={glassInputCls + " pr-14 appearance-none"} value={grade} onChange={e => setGrade(e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select></div>)}
              <div className="relative flex items-center"><span className="absolute right-5 text-slate-400"><Icon name="lock" size={22} /></span><input type="password" className={glassInputCls + " pr-14"} placeholder={isRegister ? "إنشاء كلمة مرور قوية" : "كلمة المرور"} value={password} onChange={e => setPassword(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') isRegister ? onRegister(id, password, grade) : onLogin(id, password) }}/></div>
              <button className={`${glassBtnPrimary} w-full mt-8 text-lg py-5 tracking-wide`} onClick={() => isRegister ? onRegister(id, password, grade) : onLogin(id, password)}>{isRegister ? 'تفعيل الحساب' : 'تسجيل الدخول'} <Icon name="arrow-left" size={20} /></button>
            </div>
            <div className="mt-8 text-center pt-6 border-t border-white/30"><button onClick={() => setIsRegister(!isRegister)} className="text-slate-500 font-bold hover:text-cyan-600 transition-colors w-full text-sm">{isRegister ? 'لدي حساب بالفعل' : 'طالب جديد؟ تفعيل الحساب'}</button></div>
          </div>
        </div>
      );
    }

    // ==========================================
    // SIDEBAR
    // ==========================================
    function Sidebar({ user, view, setView, logout, setIsChatOpen, isOnline }) {
      const navItems = [
        { id: 'dashboard', label: 'اللوحة الرئيسية', icon: <Icon name="layout-dashboard" size={22} />, roles: ['superadmin', 'teacher', 'student', 'management'] },
        { id: 'library', label: 'المكتبة والمواد', icon: <Icon name="library" size={22} />, roles: ['superadmin', 'teacher', 'student'] },
        { id: 'progress', label: 'التقييم الأكاديمي', icon: <Icon name="trending-up" size={22} />, roles: ['superadmin', 'teacher', 'management'] },
        { id: 'users', label: 'إدارة النظام', icon: <Icon name="users" size={22} />, roles: ['superadmin'] },
      ];
      return (
        <div className={`${glassContainer} w-[300px] h-full flex flex-col justify-between`}>
          <div>
            <div className="p-10 text-center relative">
              <button onClick={() => setIsChatOpen(true)} className="absolute top-6 left-6 p-2.5 bg-white/60 hover:bg-white rounded-xl shadow-sm text-purple-600 transition-all flex items-center gap-2 group border border-white z-10">
                 <Icon name="message-circle" size={20}/>
                 <span className="text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity absolute left-12 bg-white px-2 py-1 rounded shadow-sm whitespace-nowrap pointer-events-none">غرفة النقاش</span>
              </button>
              <div className="relative w-24 h-24 mx-auto mb-5">
                <div className="w-full h-full bg-gradient-to-tr from-cyan-400 to-blue-500 rounded-[2rem] flex items-center justify-center shadow-lg border border-white/60 text-white font-black text-4xl">{user.name.charAt(0)}</div>
                <div className={`absolute -bottom-1 -right-1 w-5 h-5 rounded-full border-2 border-white ${isOnline ? 'bg-emerald-500' : 'bg-rose-500'}`} title={isOnline ? 'متصل بالسيرفر' : 'وضع محلي'}></div>
              </div>
              <h2 className="font-black text-slate-800 text-xl mb-2">{user.name}</h2>
              <span className="text-[10px] font-black bg-white/80 px-4 py-1.5 rounded-full text-cyan-800 shadow-sm border border-white">{getRoleName(user.role)} {user.grade ? ` - ${user.grade}` : ''}</span>
            </div>
            <nav className="p-5 space-y-2">{navItems.filter(i => i.roles.includes(user.role)).map(item => (<button key={item.id} onClick={() => setView(item.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-[15px] transition-all ${view === item.id ? 'bg-white/70 text-cyan-700 shadow-sm border border-white/80' : 'text-slate-500 hover:bg-white/40'}`}><span className={view === item.id ? 'text-cyan-500' : 'text-slate-400'}>{item.icon}</span> {item.label}</button>))}</nav>
          </div>
          <div className="p-5"><button onClick={logout} className="w-full flex justify-center gap-3 bg-white/50 hover:bg-rose-50 text-slate-600 hover:text-rose-500 py-4 rounded-2xl font-bold shadow-sm"><Icon name="power" size={20} /> تسجيل خروج</button></div>
        </div>
      );
    }

    // ==========================================
    // CHAT DRAWER
    // ==========================================
    function ChatDrawer({ isOpen, onClose, user, messages, setMessages, isOnline }) {
      const [text, setText] = useState(''); 
      const bottomRef = useRef(null);
      
      useEffect(() => { 
        if(isOpen) setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 100); 
      }, [messages, isOpen]);
      
      const handleSend = async (e) => { 
        e.preventDefault(); if (!text.trim()) return; 
        const t=text; setText(''); 
        const newMsg = { dbId: 'msg_'+Date.now(), text:t, senderId:user.id, senderName:user.name, senderRole:user.role, createdAt:Date.now() };
        try{ 
          if(isOnline && db) await db.collection('messages').add(newMsg); 
          else setMessages([...messages, newMsg]); // Local mode
        } catch(e){ setMessages([...messages, newMsg]); } 
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-[100] flex">
          <div className="absolute inset-0 bg-slate-900/30 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="relative w-full md:w-[420px] h-full bg-[#eef2f6]/95 backdrop-blur-3xl shadow-[-20px_0_40px_rgba(0,0,0,0.1)] flex flex-col animate-fade-in border-r border-white/50 rtl:mr-auto">
            <div className="p-5 bg-white/60 border-b border-white/50 flex justify-between items-center backdrop-blur-md">
               <h2 className="text-xl font-black text-slate-800 flex items-center gap-3"><div className="p-2.5 bg-purple-100 text-purple-600 rounded-xl shadow-sm"><Icon name="message-circle" size={20}/></div> غرفة النقاش العام</h2>
               <button onClick={onClose} className="p-2 bg-white hover:bg-rose-50 rounded-xl shadow-sm text-slate-500 hover:text-rose-500 transition-colors border border-white/60"><Icon name="x" size={20}/></button>
            </div>
            
            <div className="flex-1 overflow-y-auto p-5 space-y-5 custom-scrollbar relative">
              {messages.length === 0 ? <div className="m-auto text-center font-bold text-slate-400 mt-10">لا توجد رسائل بعد. كن أول من يشارك!</div> : messages.map(msg => { 
                const isMe = msg.senderId === user.id; 
                return (
                  <div key={msg.dbId} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                    <span className="text-[10px] font-bold text-slate-400 mb-1 mx-2">{msg.senderName}</span>
                    <div className={`px-4 py-3 rounded-2xl max-w-[85%] shadow-sm text-sm font-bold leading-relaxed ${isMe ? 'bg-gradient-to-r from-purple-500 to-indigo-500 text-white rounded-tr-sm' : 'bg-white text-slate-800 rounded-tl-sm border border-slate-100'}`}>{msg.text}</div>
                  </div>
                ) 
              })}
              <div ref={bottomRef} />
            </div>

            <div className="p-4 bg-white/60 border-t border-white/50 backdrop-blur-md">
              <form onSubmit={handleSend} className="flex gap-2 relative">
                <input type="text" className={`${glassInputCls} !py-3.5 pr-14 bg-white/90 focus:bg-white`} placeholder="اكتب رسالتك للجميع..." value={text} onChange={e=>setText(e.target.value)} />
                <button type="submit" className="absolute left-2 top-2 bottom-2 bg-purple-600 text-white rounded-xl w-12 flex items-center justify-center hover:bg-purple-700 transition-colors shadow-sm"><Icon name="send" size={18} className="rtl:rotate-180"/></button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // DASHBOARD (الرئيسية مع التعميمات)
    // ==========================================
    function Dashboard({ user, users, lessons, subjects, news, setNews, isOnline, showNotification, setConfirmAction }) {
      const studentsCount = users.filter(u => u.role === 'student').length;
      const teachersCount = users.filter(u => u.role === 'teacher').length;
      
      const gradeLessons = user.role === 'student' ? lessons.filter(l => l.grade === user.grade) : [];
      const totalLessons = gradeLessons.length;
      const completedLessons = (user.completedLessons || []).filter(id => gradeLessons.find(l => l.dbId === id)).length;
      const progressPercent = totalLessons === 0 ? 0 : Math.round((completedLessons / totalLessons) * 100);

      const [newPost, setNewPost] = useState({title: '', content: ''});
      const canAddNews = user.role === 'superadmin' || user.role === 'management';

      const handleAddNews = async (e) => {
         e.preventDefault();
         if(!newPost.title || !newPost.content) return;
         const post = { dbId: 'news_' + Date.now(), title: newPost.title, content: newPost.content, author: user.name, createdAt: Date.now() };
         try {
            if(isOnline && db) await db.collection('news').add(post);
            else setNews([post, ...news]);
            setNewPost({title: '', content: ''});
            showNotification(isOnline ? "تم نشر الخبر بنجاح" : "تم حفظ الخبر محلياً");
         } catch(e) { setNews([post, ...news]); setNewPost({title: '', content: ''}); showNotification("تم حفظ الخبر محلياً"); }
      };

      const handleDeleteNews = (id) => {
        setConfirmAction({
          message: "هل أنت متأكد من حذف هذا الخبر/التعميم؟",
          onConfirm: async () => {
            try {
              if (isOnline && db) await db.collection('news').doc(id).delete();
              else setNews(news.filter(n => n.dbId !== id));
              showNotification(isOnline ? "تم مسح الخبر بنجاح" : "تم مسح الخبر محلياً");
            } catch(e) { setNews(news.filter(n => n.dbId !== id)); showNotification("تم مسح الخبر محلياً"); }
          }
        });
      };

      return (
        <div className="space-y-8 animate-fade-in pb-10">
          <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <h1 className="text-3xl md:text-5xl font-black text-slate-800 tracking-tight leading-tight">مرحباً، <br/><span className="fluid-gradient-text">{user.name}</span> ✨</h1>
              <p className="text-slate-500 mt-3 font-bold text-lg">إليك نظرة سريعة على المستجدات.</p>
            </div>
          </header>

          {['superadmin', 'management'].includes(user.role) && (
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
              <div className={`${glassContainer} p-6 flex items-center gap-5`}><div className="bg-blue-500 p-4 rounded-2xl text-white shadow-lg"><Icon name="users" size={28}/></div><div><p className="text-slate-500 font-bold text-xs">إجمالي الطلاب</p><h3 className="text-3xl font-black">{studentsCount}</h3></div></div>
              <div className={`${glassContainer} p-6 flex items-center gap-5`}><div className="bg-cyan-500 p-4 rounded-2xl text-white shadow-lg"><Icon name="shield" size={28}/></div><div><p className="text-slate-500 font-bold text-xs">طاقم التدريس</p><h3 className="text-3xl font-black">{teachersCount}</h3></div></div>
              <div className={`${glassContainer} p-6 flex items-center gap-5`}><div className="bg-emerald-500 p-4 rounded-2xl text-white shadow-lg"><Icon name="library" size={28}/></div><div><p className="text-slate-500 font-bold text-xs">المواد الدراسية</p><h3 className="text-3xl font-black">{subjects.length}</h3></div></div>
            </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div className="lg:col-span-5 flex flex-col gap-8">
              {user.role === 'student' ? (
                <div className={`${glassContainer} p-8 flex flex-col justify-center relative`}>
                  <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-400/20 rounded-full blur-3xl"></div>
                  <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-slate-800"><div className="p-2 bg-emerald-100 text-emerald-500 rounded-xl"><Icon name="activity" size={24} /></div> الإنجاز العام</h3>
                  <div className="flex items-end justify-between mb-4"><div><span className="font-bold text-slate-400 text-sm">دروس مكتملة</span><br/><span className="font-black text-slate-800 text-3xl">{completedLessons} <span className="text-lg text-slate-400">/ {totalLessons}</span></span></div><span className="font-black text-emerald-500 text-5xl">{progressPercent}%</span></div>
                  <div className="w-full bg-white/50 rounded-full h-4 overflow-hidden"><div className="bg-gradient-to-l from-emerald-400 to-teal-400 h-4 rounded-full transition-all duration-1000" style={{ width: `${progressPercent}%` }}></div></div>
                </div>
              ) : (
                <div className={`${glassContainer} p-8 text-center bg-gradient-to-br from-indigo-50/50 to-white/30`}>
                  <Icon name="award" size={56} className="mx-auto text-indigo-300 mb-4"/>
                  <h3 className="text-2xl font-black text-slate-800 mb-2">منصة الإدارة الذكية</h3>
                  <p className="text-slate-500 font-bold text-sm leading-relaxed">استخدم القائمة الجانبية لإدارة المكتبة، متابعة تقييمات الطلاب، وتنظيم الحسابات بفعالية.</p>
                </div>
              )}
            </div>

            <div className="lg:col-span-7">
               <div className="flex justify-between items-center mb-6">
                  <h3 className="text-2xl font-black flex items-center gap-3 text-slate-800">
                    <div className="p-2 bg-blue-100 text-blue-600 rounded-xl shadow-sm"><Icon name="newspaper" size={24} /></div> حائط الأخبار والتعميمات
                  </h3>
               </div>
               
               {canAddNews && (
                  <form onSubmit={handleAddNews} className={`${glassContainer} p-6 mb-8 flex flex-col gap-4 bg-white/40 border-2 border-dashed border-blue-200`}>
                     <input type="text" placeholder="عنوان الخبر أو التعميم..." className={`${glassInputCls} !bg-white/80`} value={newPost.title} onChange={e=>setNewPost({...newPost, title: e.target.value})} />
                     <textarea placeholder="تفاصيل التعميم..." className={`${glassInputCls} !bg-white/80 h-24 resize-none`} value={newPost.content} onChange={e=>setNewPost({...newPost, content: e.target.value})}></textarea>
                     <button type="submit" className={`${glassBtnPrimary} self-end`}><Icon name="send" size={18}/> نشر التعميم</button>
                  </form>
               )}

               <div className="space-y-5">
                 {news.map(item => (
                    <div key={item.dbId} className={`${glassContainer} p-6 bg-gradient-to-br from-white/80 to-white/40 border-r-4 border-r-blue-500 shadow-sm relative group`}>
                       {canAddNews && (
                         <button onClick={() => handleDeleteNews(item.dbId)} className="absolute top-4 left-4 text-rose-500 bg-rose-50 hover:bg-rose-100 hover:text-rose-600 shadow-sm p-2.5 rounded-xl z-10 transition-colors border border-rose-100">
                           <Icon name="trash-2" size={18} />
                         </button>
                       )}
                       <div className="flex flex-col md:flex-row md:justify-between md:items-start gap-2 mb-3">
                          <h4 className="text-xl font-black text-slate-800 ml-12">{item.title}</h4>
                          <span className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-lg w-fit">{new Date(item.createdAt).toLocaleDateString('ar-EG')}</span>
                       </div>
                       <p className="text-slate-700 font-bold leading-relaxed mb-5 text-sm md:text-base whitespace-pre-wrap">{item.content}</p>
                       <div className="flex items-center gap-2 text-xs font-black text-blue-700 bg-blue-50 w-fit px-3 py-1.5 rounded-lg border border-blue-100">
                         <Icon name="pen-tool" size={14}/> المُرسِل: {item.author}
                       </div>
                    </div>
                 ))}
                 {news.length === 0 && <div className="text-center p-10 bg-white/30 rounded-3xl font-bold text-slate-500 border border-dashed border-slate-300">لا توجد أخبار أو تعميمات حالياً.</div>}
               </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // LIBRARY MANAGER
    // ==========================================
    function LibraryManager({ user, subjects, setSubjects, lessons, setLessons, quizzes, setQuizzes, isOnline, showNotification, setConfirmAction }) {
      const [filterGrade, setFilterGrade] = useState(user.role === 'student' ? user.grade : GRADES[0]);
      const [activeSubject, setActiveSubject] = useState(null);
      const [newSubjectName, setNewSubjectName] = useState('');
      
      const gradeSubjects = subjects.filter(s => s.grade === filterGrade);

      const handleAddSubject = async (e) => {
        e.preventDefault();
        if(!newSubjectName.trim()) return;
        const newSub = { dbId: 'sub_' + Date.now(), name: newSubjectName, grade: filterGrade, teacherId: user.id };
        try {
          if (isOnline && db) await db.collection('subjects').doc(newSub.dbId).set(newSub);
          else setSubjects([...subjects, newSub]); 
          setNewSubjectName(''); showNotification(isOnline ? "تم إضافة المادة بنجاح" : "تم حفظ المادة محلياً");
        } catch(err) { setSubjects([...subjects, newSub]); setNewSubjectName(''); showNotification("تم حفظ المادة محلياً"); }
      };

      const handleDeleteSubject = (e, id) => {
        e.stopPropagation(); 
        setConfirmAction({
          message: "تحذير: سيتم مسح هذه المادة بالكامل. هل أنت متأكد؟",
          onConfirm: async () => {
            try {
              if (isOnline && db) await db.collection('subjects').doc(id).delete();
              else setSubjects(subjects.filter(s => s.dbId !== id));
              showNotification(isOnline ? "تم مسح المادة" : "تم مسح المادة محلياً");
            } catch(err) { setSubjects(subjects.filter(s => s.dbId !== id)); showNotification("تم المسح محلياً"); }
          }
        });
      };

      if (!activeSubject) {
        return (
          <div className="space-y-8 animate-fade-in pb-10">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
              <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-blue-100 text-blue-600 rounded-xl"><Icon name="book" size={28} /></div> المكتبة الرقمية</h2>
              {user.role !== 'student' && (
                <div className="flex items-center gap-3 bg-white/40 p-2 rounded-2xl border border-white/60">
                  <span className="font-bold text-slate-500 text-sm mr-2">عرض صف:</span>
                  <select className="bg-white px-4 py-2 rounded-xl font-bold text-slate-800 outline-none border border-white shadow-sm" value={filterGrade} onChange={e => setFilterGrade(e.target.value)}>
                    {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
              )}
            </div>

            {user.role !== 'student' && (
              <form onSubmit={handleAddSubject} className="flex gap-4 items-center bg-white/30 p-4 rounded-3xl border border-white/50 backdrop-blur-md w-full max-w-xl">
                 <input type="text" placeholder="اسم المادة الجديدة..." className={`${glassInputCls} !py-3`} value={newSubjectName} onChange={e=>setNewSubjectName(e.target.value)} required />
                 <button type="submit" className={`${glassBtnPrimary} !py-3 whitespace-nowrap`}><Icon name="plus" size={20}/> إضافة مادة</button>
              </form>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">
              {gradeSubjects.map(sub => (
                <div key={sub.dbId} onClick={() => setActiveSubject(sub)} className={`${glassContainer} p-8 flex flex-col items-center justify-center gap-4 hover:-translate-y-2 transition-transform duration-300 cursor-pointer border-t-4 border-t-blue-400 relative group`}>
                  {user.role !== 'student' && (
                    <button onClick={(e) => handleDeleteSubject(e, sub.dbId)} className="absolute top-4 left-4 text-rose-500 bg-rose-50 hover:text-rose-600 hover:bg-rose-100 shadow-sm p-2.5 rounded-xl z-10 transition-colors border border-rose-100">
                      <Icon name="trash-2" size={18} />
                    </button>
                  )}
                  <div className="w-20 h-20 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-3xl flex items-center justify-center text-blue-600 group-hover:scale-110 transition-transform duration-300 shadow-inner"><Icon name="folder-open" size={36} /></div>
                  <h3 className="font-black text-slate-800 text-xl text-center mt-2">{sub.name}</h3>
                  <span className="text-xs font-bold bg-white/60 px-3 py-1 rounded-full text-slate-500 shadow-sm">{lessons.filter(l => l.subjectId === sub.dbId).length} دروس | {quizzes.filter(q => q.subjectId === sub.dbId).length} اختبارات</span>
                </div>
              ))}
              {gradeSubjects.length === 0 && <div className="col-span-full text-center py-20 bg-white/20 rounded-3xl border-2 border-dashed border-slate-300"><Icon name="folder-search" size={48} className="mx-auto text-slate-400 mb-4"/><p className="text-slate-500 font-bold text-xl">لا توجد مواد مضافة لهذا الصف.</p></div>}
            </div>
          </div>
        );
      }

      return <SubjectDetails user={user} subject={activeSubject} goBack={() => setActiveSubject(null)} lessons={lessons} setLessons={setLessons} quizzes={quizzes} setQuizzes={setQuizzes} isOnline={isOnline} showNotification={showNotification} setConfirmAction={setConfirmAction} />;
    }

    // ==========================================
    // INSIDE A SUBJECT
    // ==========================================
    function SubjectDetails({ user, subject, goBack, lessons, setLessons, quizzes, setQuizzes, isOnline, showNotification, setConfirmAction }) {
      const [activeTab, setActiveTab] = useState('lessons');
      const subjectLessons = lessons.filter(l => l.subjectId === subject.dbId);
      const subjectQuizzes = quizzes.filter(q => q.subjectId === subject.dbId);

      const [lessonForm, setLessonForm] = useState({ title: '', link: '', type: 'video' });
      const [showQuizBuilder, setShowQuizBuilder] = useState(false);

      const handleAddLesson = async (e) => {
        e.preventDefault();
        const newLes = { dbId: 'les_' + Date.now(), subjectId: subject.dbId, grade: subject.grade, ...lessonForm, createdAt: Date.now() };
        try {
          if (isOnline && db) await db.collection('lessons').doc(newLes.dbId).set(newLes);
          else setLessons([newLes, ...lessons]);
          setLessonForm({ title: '', link: '', type: 'video' }); showNotification(isOnline ? "تم نشر المحتوى" : "تم حفظ المحتوى محلياً");

               <div><h2 className="text-2xl font-black text-slate-800">{subject.name}</h2><span className="text-xs font-bold text-slate-500">{subject.grade}</span></div>
             </div>
             <div className="flex bg-white/50 p-1.5 rounded-2xl border border-white/60 w-full md:w-auto">
               <button onClick={()=>setActiveTab('lessons')} className={`flex-1 md:w-32 py-2.5 rounded-xl font-bold text-sm transition-all ${activeTab==='lessons' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}>الدروس</button>
               <button onClick={()=>setActiveTab('quizzes')} className={`flex-1 md:w-32 py-2.5 rounded-xl font-bold text-sm transition-all ${activeTab==='quizzes' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500 hover:text-slate-800'}`}>الاختبارات</button>
             </div>
          </div>

          {activeTab === 'lessons' && (
            <div className="space-y-6 animate-fade-in">
              {user.role !== 'student' && (
                <form onSubmit={handleAddLesson} className={`${glassContainer} p-6 flex flex-col md:flex-row gap-4 items-end bg-blue-50/30`}>
                  <div className="w-full md:flex-1"><label className="text-xs font-bold text-slate-500 mb-2 block">عنوان الدرس</label><input type="text" required className={glassInputCls} value={lessonForm.title} onChange={e=>setLessonForm({...lessonForm, title: e.target.value})}/></div>
                  <div className="w-full md:w-40"><label className="text-xs font-bold text-slate-500 mb-2 block">النوع</label><select className={glassInputCls} value={lessonForm.type} onChange={e=>setLessonForm({...lessonForm, type: e.target.value})}><option value="video">فيديو</option><option value="pdf">ملف/رابط</option></select></div>
                  <div className="w-full md:flex-1"><label className="text-xs font-bold text-slate-500 mb-2 block">الرابط</label><input type="url" required className={glassInputCls} value={lessonForm.link} onChange={e=>setLessonForm({...lessonForm, link: e.target.value})}/></div>
                  <button type="submit" className={`${glassBtnPrimary} w-full md:w-auto h-[58px] px-8`}>إضافة</button>
                </form>
              )}
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {subjectLessons.map(lesson => (
                  <div key={lesson.dbId} className={`${glassContainer} p-6 flex flex-col group relative`}>
                    {user.role !== 'student' && (
                      <button onClick={() => handleDelete('lessons', lesson.dbId, setLessons, lessons)} className="absolute top-4 left-4 text-rose-500 bg-rose-50 hover:bg-rose-100 hover:text-rose-600 shadow-sm p-2.5 rounded-xl z-10 transition-colors border border-rose-100">
                        <Icon name="trash-2" size={18} />
                      </button>
                    )}
                    <div className={`w-14 h-14 rounded-2xl mb-5 flex items-center justify-center shadow-inner bg-white ${lesson.type === 'video' ? 'text-rose-500' : 'text-blue-500'}`}>{lesson.type === 'video' ? <Icon name="play" size={24} /> : <Icon name="file-text" size={24} />}</div>

                    <a href={lesson.link} target="_blank" rel="noreferrer" className="w-full bg-white/60 hover:bg-white text-slate-800 font-bold py-3 rounded-xl transition-all shadow-sm border border-white/80 flex items-center justify-center gap-2 mt-auto">فتح المحتوى <Icon name="external-link" size={18} /></a>
                  </div>

                {subjectLessons.length === 0 && <div className="col-span-full p-10 text-center bg-white/20 rounded-3xl font-bold text-slate-500">لا توجد دروس حالياً في هذه المادة.</div>}

    // ==========================================
    // QUIZ BUILDER & PLAYER
    // ==========================================
    function QuizBuilder({ subject, onCancel, onSave }) {
      const [title, setTitle] = useState('');
      const [questions, setQuestions] = useState([{ q: '', options: ['', '', ''], correct: '' }]);

      const updateQ = (idx, field, value) => {
        const newQs = [...questions];
        if(field === 'options') { const optIdx = value.optIdx; newQs[idx].options[optIdx] = value.val; if(newQs[idx].correct === questions[idx].options[optIdx]) newQs[idx].correct = value.val; } 
        else { newQs[idx][field] = value; }
        setQuestions(newQs);
      };

      const handleSave = () => {
        if(!title) return alert("أدخل عنوان الاختبار");
        const validQs = questions.filter(q => q.q && q.correct && q.options[0]);
        if(validQs.length === 0) return alert("أضف سؤالاً صحيحاً واحداً على الأقل");
        onSave({ dbId: 'quiz_' + Date.now(), subjectId: subject.dbId, grade: subject.grade, title, questions: validQs, createdAt: Date.now() });
      };

      return (
        <div className={`${glassContainer} p-8 bg-orange-50/50 border-orange-200/50`}>
          <div className="flex justify-between items-center mb-6">
            <h3 className="text-xl font-black text-orange-800 flex items-center gap-2"><Icon name="edit-3"/> بناء اختبار جديد</h3>
            <button onClick={onCancel} className="text-slate-400 hover:text-red-500"><Icon name="x-circle"/></button>
          </div>
          <input type="text" placeholder="عنوان الاختبار (مثال: اختبار الوحدة الأولى)" className={`${glassInputCls} mb-8 !bg-white/80 font-black text-lg text-orange-900 border-orange-200`} value={title} onChange={e=>setTitle(e.target.value)}/>
          <div className="space-y-6 mb-6">
            {questions.map((q, idx) => (
              <div key={idx} className="bg-white/60 p-6 rounded-2xl border border-white shadow-sm relative">
                <span className="absolute top-4 left-4 text-xs font-bold text-slate-400">سؤال {idx+1}</span>
                <input type="text" placeholder="اكتب السؤال هنا..." className={`${glassInputCls} mb-4 !bg-white`} value={q.q} onChange={e=>updateQ(idx, 'q', e.target.value)}/>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                  {[0,1,2].map(optIdx => (<input key={optIdx} type="text" placeholder={`خيار ${optIdx+1}`} className={`${glassInputCls} !py-2 !bg-white text-sm`} value={q.options[optIdx]} onChange={e=>updateQ(idx, 'options', {optIdx, val:e.target.value})}/>))}
                </div>
                <select className={`${glassInputCls} !py-2 !bg-emerald-50 border-emerald-200 text-emerald-800 text-sm`} value={q.correct} onChange={e=>updateQ(idx, 'correct', e.target.value)}>
                   <option value="">-- حدد الإجابة الصحيحة --</option>
                   {q.options.map((opt, i) => opt ? <option key={i} value={opt}>{opt}</option> : null)}
                </select>
              </div>
            ))}
          </div>
          <div className="flex gap-4">
             <button onClick={()=>setQuestions([...questions, { q: '', options: ['', '', ''], correct: '' }])} className="bg-white text-orange-600 font-bold py-3 px-6 rounded-xl border-2 border-orange-200 border-dashed hover:bg-orange-50 transition-all flex items-center gap-2"><Icon name="plus"/> سؤال إضافي</button>
             <button onClick={handleSave} className="bg-gradient-to-r from-orange-500 to-rose-500 text-white font-black py-3 px-8 rounded-xl shadow-lg hover:shadow-xl transition-all flex-1">حفظ ونشر الاختبار</button>
          </div>
        </div>
      );
    }

    function QuizCard({ quiz, user, onDelete, showNotification }) {
      const [isOpen, setIsOpen] = useState(false);
      const [answers, setAnswers] = useState({});
      const [result, setResult] = useState(null); 
      const prevScore = user.role === 'student' && user.quizScores ? user.quizScores[quiz.dbId] : null;

      const handleSubmit = () => {
        let correctCount = 0;
        quiz.questions.forEach((q, idx) => { if(answers[idx] === q.correct) correctCount++; });
        const score = Math.round((correctCount / quiz.questions.length) * 100);
        setResult({ score, correct: correctCount, total: quiz.questions.length });
        showNotification(`تم تسليم الاختبار بنجاح! درجتك: ${score}%`);
      };

      if (!isOpen) {
        return (
          <div className={`${glassContainer} p-6 flex flex-col group relative overflow-hidden bg-gradient-to-br from-white/40 to-orange-50/30`}>
             {user.role !== 'student' && (
               <button onClick={onDelete} className="absolute top-4 left-4 text-rose-500 bg-rose-50 hover:bg-rose-100 hover:text-rose-600 shadow-sm p-2.5 rounded-xl z-10 transition-colors border border-rose-100">
                 <Icon name="trash-2" size={18} />
               </button>
             )}
             <div className="w-14 h-14 rounded-2xl mb-5 flex items-center justify-center shadow-inner bg-orange-100 text-orange-500"><Icon name="help-circle" size={28} /></div>
             <h4 className="text-xl font-black mb-2 text-slate-800 ml-10">{quiz.title}</h4>
             <span className="text-sm font-bold text-slate-500 mb-6">{quiz.questions.length} أسئلة</span>
             {user.role === 'student' ? (
                prevScore != null ? (<div className="mt-auto bg-emerald-100 text-emerald-700 font-bold p-3 rounded-xl text-center flex items-center justify-center gap-2 border border-emerald-200"><Icon name="check-circle"/> النتيجة السابقة: {prevScore}%</div>) 
                : (<button onClick={()=>setIsOpen(true)} className="mt-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-all shadow-md">بدء الاختبار</button>)
             ) : (<button onClick={()=>setIsOpen(true)} className="mt-auto bg-white border border-slate-300 text-slate-700 font-bold py-3 rounded-xl transition-all shadow-sm">استعراض الأسئلة</button>)}
          </div>
        );
      }

      return (
        <div className="col-span-full bg-white rounded-[2rem] shadow-2xl p-8 border border-slate-100 animate-fade-in relative z-50">
          <button onClick={()=>{setIsOpen(false); setResult(null); setAnswers({});}} className="absolute top-6 left-6 text-slate-400 hover:text-slate-700 bg-slate-100 p-2 rounded-full"><Icon name="x"/></button>
          <h2 className="text-3xl font-black text-slate-800 mb-8 text-center">{quiz.title}</h2>
          {result ? (
            <div className="text-center py-10">
              <div className={`w-32 h-32 mx-auto rounded-full flex items-center justify-center text-5xl font-black text-white mb-6 shadow-xl ${result.score >= 50 ? 'bg-emerald-500 shadow-emerald-500/30' : 'bg-red-500 shadow-red-500/30'}`}>{result.score}%</div>
              <h3 className="text-2xl font-black text-slate-800 mb-2">{result.score >= 50 ? 'عمل رائع!' : 'حاول مرة أخرى!'}</h3>
              <p className="text-slate-500 font-bold">أجبت بشكل صحيح على {result.correct} من أصل {result.total} أسئلة.</p>
              <button onClick={()=>{setIsOpen(false); setResult(null); setAnswers({});}} className="mt-8 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-8 rounded-xl transition-all">إغلاق</button>
            </div>
          ) : (
            <div className="space-y-8 max-w-3xl mx-auto">
              {quiz.questions.map((q, idx) => (
                <div key={idx} className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                  <h3 className="text-lg font-black text-slate-800 mb-5">{idx+1}. {q.q}</h3>
                  <div className="space-y-3">
                    {q.options.map((opt, oIdx) => opt && (
                      <label key={oIdx} className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer transition-all border-2 ${answers[idx] === opt ? 'bg-orange-50 border-orange-400 text-orange-900' : 'bg-white border-transparent hover:border-slate-200 text-slate-700'}`}>
                        <input type="radio" name={`q_${idx}`} className="w-5 h-5 accent-orange-500" checked={answers[idx] === opt} onChange={()=>setAnswers({...answers, [idx]: opt})} disabled={user.role !== 'student'} />
                        <span className="font-bold">{opt}</span>
                      </label>
                    ))}
                  </div>
                  {user.role !== 'student' && <div className="mt-4 text-xs font-bold text-emerald-600 bg-emerald-50 inline-block px-3 py-1.5 rounded-lg border border-emerald-100">الإجابة الصحيحة: {q.correct}</div>}
                </div>
              ))}
              {user.role === 'student' && (<button onClick={handleSubmit} disabled={Object.keys(answers).length < quiz.questions.length} className={`w-full py-4 rounded-2xl font-black text-lg transition-all shadow-xl ${Object.keys(answers).length < quiz.questions.length ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-orange-500 to-rose-500 text-white hover:scale-[1.02]'}`}>تسليم الإجابات</button>)}
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // PROGRESS DASHBOARD
    // ==========================================
    function ProgressDashboard({ users, lessons, user }) {
      const students = users.filter(u => u.role === 'student');
      const [selectedGrade, setSelectedGrade] = useState(GRADES[0]);
      const filteredStudents = students.filter(s => s.grade === selectedGrade);

        <div className="space-y-8 animate-fade-in pb-10">
          <div className="flex justify-between items-center bg-white/40 p-4 rounded-3xl border border-white/60"><h2 className="text-3xl font-black flex items-center gap-3"><div className="p-2 bg-emerald-100 text-emerald-500 rounded-xl"><Icon name="bar-chart" size={28} /></div> التقييم</h2><select className={`${glassInputCls} w-auto !py-2`} value={selectedGrade} onChange={e => setSelectedGrade(e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select></div>
          <div className="grid grid-cols-1 gap-6">
            {filteredStudents.length === 0 ? (<div className="text-center py-20 bg-white/30 rounded-3xl"><p className="text-slate-500 font-bold">القسم فارغ.</p></div>) : 
              filteredStudents.map(student => (
                <div key={student.id} className={`${glassContainer} p-6 flex flex-col md:flex-row gap-6 items-center`}><div className="w-12 h-12 bg-cyan-100 text-cyan-600 rounded-full flex items-center justify-center font-black">{student.name.charAt(0)}</div><div className="flex-1 text-center md:text-right"><h3 className="text-xl font-black text-slate-800">{student.name}</h3><p className="text-xs font-bold text-slate-400">ID: {student.id}</p></div><div className="bg-white/50 p-4 rounded-2xl font-black text-slate-700">الدروس المكتملة: {(student.completedLessons || []).length}</div></div>
              ))
            }
          </div>
        </div>
      );

    // ==========================================
    // USERS MANAGER
    // ==========================================
    function UsersManager({ users, setUsers, isOnline, showNotification, setConfirmAction }) {
      const [form, setForm] = useState({ id: '', name: '', role: 'student', grade: GRADES[0] });
      const [bulkText, setBulkText] = useState('');
      const [filterRole, setFilterRole] = useState('student');
      const [filterGrade, setFilterGrade] = useState(GRADES[0]);
      const [promoteFrom, setPromoteFrom] = useState(GRADES[0]);

      const roles = [{val: 'student', label: 'طالب'}, {val: 'teacher', label: 'معلم'}, {val: 'management', label: 'إدارة'}];

      const handleAddSingle = async (e) => {
        e.preventDefault();
        if (!form.id || !form.name) return;
        const newUser = { id: form.id, name: form.name, role: form.role, grade: form.role === 'student' ? form.grade : null, password: '', status: 'pending', completedLessons: [], quizScores: {}, teacherEvaluation: '', createdAt: Date.now() };
        try {
          if(isOnline && db) await db.collection('users').doc(form.id).set(newUser);
          else setUsers([...users, newUser]);
          setForm({ id: '', name: '', role: 'student', grade: GRADES[0] });
          showNotification(isOnline ? "تم إنشاء الحساب" : "تم الحفظ محلياً");
        } catch (err) { setUsers([...users, newUser]); setForm({ id: '', name: '', role: 'student', grade: GRADES[0] }); showNotification("تم الحفظ محلياً"); }
      };

      const handleBulkAdd = async () => {
        if (!bulkText.trim()) return;
        const lines = bulkText.split('\n');
        let count = 0; const newUsersList = [];
        try {
          await Promise.all(lines.map(async line => {
            if (!line.trim()) return;
            const parts = line.split(',');
            if (parts.length >= 2) {
              const id = parts[0].trim(), name = parts[1].trim(), grade = parts[2] ? parts[2].trim() : form.grade;
              const nU = { id, name, role: 'student', grade, password: '', status: 'pending', completedLessons: [], quizScores: {}, teacherEvaluation: '', createdAt: Date.now() };
              if(isOnline && db) await db.collection('users').doc(id).set(nU);
              else newUsersList.push(nU);
              count++;
            }
          }));
          if(!isOnline) setUsers([...users, ...newUsersList]);
          setBulkText(''); showNotification(isOnline ? `تم تسجيل ${count} مستخدم` : `تم تسجيل ${count} مستخدم محلياً`);
        } catch(e) { setUsers([...users, ...newUsersList]); setBulkText(''); showNotification(`تم تسجيل ${count} مستخدم محلياً`); }
      };

      const handleDelete = (id) => {
        if (id === 'Asad Amir' || id === 'teacher1' || id === 'student1') return showNotification("محمي من الحذف", "error");
        setConfirmAction({ message: "حذف نهائي؟", onConfirm: async () => { 
          try { 
            if(isOnline && db) await db.collection('users').doc(id).delete(); 
            else setUsers(users.filter(u => u.id !== id));
            showNotification(isOnline ? "تم الحذف" : "تم الحذف محلياً"); 
          } catch(e) { setUsers(users.filter(u => u.id !== id)); showNotification("تم الحذف محلياً"); }
        }});
      };

      const filteredUsers = users.filter(u => { if (filterRole === 'student') return u.role === 'student' && u.grade === filterGrade; return u.role === filterRole; });

      return (
        <div className="space-y-8 pb-10 animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
             <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><Icon name="users" size={28} /></div> إدارة المنظومة</h2>
          </div>
          <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
            <div className={`${glassContainer} p-8`}>
              <h3 className="text-xl font-black mb-6 text-slate-800">إضافة مستخدم جديد</h3>
              <form onSubmit={handleAddSingle} className="space-y-5">
                <input type="text" placeholder="المعرف (ID)" className={glassInputCls} value={form.id} onChange={e=>setForm({...form, id: e.target.value})} required/>
                <input type="text" placeholder="الاسم" className={glassInputCls} value={form.name} onChange={e=>setForm({...form, name: e.target.value})} required/>
                <div className="flex gap-4">
                  <select className={glassInputCls} value={form.role} onChange={e=>setForm({...form, role: e.target.value})}>{roles.map(r => <option key={r.val} value={r.val}>{r.label}</option>)}</select>
                  {form.role === 'student' && <select className={glassInputCls} value={form.grade} onChange={e=>setForm({...form, grade: e.target.value})}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select>}
                </div>
                <button type="submit" className={`${glassBtnPrimary} w-full mt-4`}>حفظ</button>
              </form>
            </div>
            <div className="flex flex-col gap-8">
              <div className={`${glassContainer} p-8`}>
                <h3 className="text-xl font-black mb-4 text-slate-800">استيراد أرقام الهويات (CSV)</h3>
                <textarea className={`${glassInputCls} h-24 resize-none`} placeholder="الهوية, الاسم, الصف (في كل سطر)" value={bulkText} onChange={e => setBulkText(e.target.value)}></textarea>
                <button onClick={handleBulkAdd} className="w-full mt-4 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-2xl shadow-md transition-colors">استيراد الدفعة</button>
              </div>
            </div>
          </div>
          <div className={`${glassContainer} p-6 overflow-hidden flex flex-col`}>
            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-5 bg-white/40 p-4 rounded-2xl border border-white/60">
               <div className="flex gap-3 w-full md:w-auto">
                 <select className={`${glassInputCls} py-2`} value={filterRole} onChange={e=>setFilterRole(e.target.value)}>{roles.map(r => <option key={r.val} value={r.val}>{r.label}</option>)}</select>
                 {filterRole === 'student' && (<select className={`${glassInputCls} py-2`} value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select>)}
               </div>
            </div>
            <div className="overflow-x-auto rounded-2xl border border-white/50 bg-white/20">
              <table className="w-full text-right border-collapse min-w-[700px]">
                <thead>
                  <tr className="bg-slate-800 text-white"><th className="p-5 text-sm font-bold">ID</th><th className="p-5 text-sm font-bold">الاسم</th><th className="p-5 text-sm font-bold">كلمة المرور</th><th className="p-5 text-sm font-bold text-center">إجراء</th></tr>
                </thead>
                <tbody>
                  {filteredUsers.length === 0 ? (<tr><td colSpan="4" className="p-10 text-center text-slate-500 font-bold">القائمة فارغة</td></tr>) : 
                    filteredUsers.map(u => (
                    <tr key={u.id} className="border-b border-white/40 hover:bg-white/60">
                      <td className="p-5 font-bold text-slate-500">{u.id}</td><td className="p-5 font-black text-slate-800">{u.name}</td>
                      <td className="p-5 text-rose-500 font-bold text-sm">{u.password || '- (غير مفعل)'}</td>
                      <td className="p-5 text-center"><button onClick={() => handleDelete(u.id)} className="text-rose-500 bg-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm border border-rose-100 hover:bg-rose-50">حذف</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function getRoleName(r) { switch(r) { case 'superadmin': return 'المدير'; case 'management': return 'الإدارة'; case 'teacher': return 'المعلم'; case 'student': return 'الطالب'; default: return r; } }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
