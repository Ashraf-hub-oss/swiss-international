<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swiss International School</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for compiling JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase App (Compat API for standalone HTML) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      /* Advanced Glassmorphism Utilities */
      .glass-morphism {
        @apply bg-white/10 backdrop-blur-2xl backdrop-saturate-150 border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] relative overflow-hidden;
      }
      .glass-edge {
        @apply before:absolute before:inset-0 before:p-[1px] before:rounded-[inherit] before:bg-gradient-to-br before:from-white/60 before:to-transparent before:-z-10 before:pointer-events-none;
      }
      .glass-button {
        @apply bg-gradient-to-br from-white/30 to-white/10 backdrop-blur-md border border-white/40 shadow-[0_8px_16px_rgba(0,0,0,0.05)] hover:shadow-[0_12px_24px_rgba(0,0,0,0.1)] hover:from-white/40 hover:to-white/20 transition-all duration-500;
      }
      .fluid-gradient-text {
        @apply text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 via-blue-600 to-emerald-500 bg-[length:200%_auto] animate-gradient;
      }
    }

    /* Fluid Animations & Liquid Backgrounds */
    @keyframes animateGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-gradient { animation: animateGradient 6s ease infinite; }

    @keyframes liquidBlob {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
      34% { transform: translate(4vw, -5vh) scale(1.05) rotate(5deg); border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
      67% { transform: translate(-3vw, 4vh) scale(0.95) rotate(-5deg); border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .liquid-bg-1 { animation: liquidBlob 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
    .liquid-bg-2 { animation: liquidBlob 25s infinite alternate-reverse cubic-bezier(0.4, 0, 0.2, 1); }
    .liquid-bg-3 { animation: liquidBlob 22s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); animation-delay: -5s; }
    .animate-float { animation: float 6s ease-in-out infinite; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.4); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.8); }
    
    .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(4px); } 
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
    }
  </style>
</head>
<body class="bg-[#eef2f6] text-slate-800 font-sans rtl overflow-x-hidden selection:bg-cyan-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // BULLETPROOF LUCIDE ICONS COMPONENT
    // ==========================================
    const Icon = ({ name, size = 24, className = "" }) => {
      const svgRef = useRef(null);
      useEffect(() => {
        if (svgRef.current && window.lucide) {
          const iconName = name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
          const iconData = window.lucide.icons[iconName];
          if (iconData) {
            const svgNode = window.lucide.createElement(iconData);
            svgNode.setAttribute('width', size);
            svgNode.setAttribute('height', size);
            svgNode.setAttribute('stroke-width', '2');
            if (className) svgNode.setAttribute('class', className);
            svgRef.current.innerHTML = '';
            svgRef.current.appendChild(svgNode);
          }
        }
      }, [name, size, className]);
      return <span ref={svgRef} className={`inline-flex items-center justify-center ${className}`}></span>;
    };

    // ==========================================
    // FIREBASE CONFIGURATION (مُحدث بقاعدة بياناتك)
    // ==========================================
    let firebaseConfig = {
      apiKey: "AIzaSyDBjYPF_M3Lb3Y4tct_x5kA-LBZocfEP2c", // استبدل هذا عند الرفع للاستضافة
      authDomain: "swiss-international-d6578.firebaseapp.com",
      databaseURL: "https://swiss-international-d6578-default-rtdb.firebaseio.com",
      projectId: "swiss-international-d6578",
      storageBucket: "swiss-international-d6578.appspot.com",
      messagingSenderId: "720440406051", // استبدل هذا عند الرفع للاستضافة
      appId: "1:720440406051:web:5aa7de314737ddc32b4196", // استبدل هذا عند الرفع للاستضافة
      measurementId: "G-HY8CF4VR00",
    };

    // دعم بيئة العرض المباشر (لتعمل في المعاينة الحالية)
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    }

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
    } catch(e) {
      console.warn("Firebase config is empty or invalid. Using local state fallback.", e);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // دعم معرف التطبيق في بيئة العرض
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'swiss-school-prod';
    
    // دالة الحصول على المسار الآمن لقاعدة البيانات اللحظية
    const getPath = (col) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);

    // --- Global Constants ---
    const GRADES = ['الاول ابتدائي', 'الثاني ابتدائي', 'الثالث ابتدائي', 'الرابع ابتدائي', 'الخامس ابتدائي', 'السادس ابتدائي', 'الاول متوسط', 'الثاني متوسط', 'الثالث متوسط'];

    // --- PREMIUM UI TOKENS ---
    const glassContainer = "glass-morphism glass-edge rounded-[2rem]";
    const glassInputCls = "w-full bg-white/40 backdrop-blur-md border border-white/50 shadow-[inset_0_2px_8px_rgba(0,0,0,0.04)] rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-cyan-400/50 focus:bg-white/60 placeholder-slate-400 text-slate-800 font-bold transition-all duration-500 hover:bg-white/50";
    const glassBtnPrimary = "relative overflow-hidden bg-gradient-to-r from-cyan-400 via-blue-500 to-cyan-500 bg-[length:200%_auto] animate-gradient text-white font-black py-4 px-8 rounded-2xl transition-all duration-500 shadow-[0_8px_20px_rgba(6,182,212,0.3)] hover:shadow-[0_15px_30px_rgba(6,182,212,0.4)] hover:-translate-y-1 active:translate-y-0 active:scale-95 flex items-center justify-center gap-3";

    // --- Default Accounts ---
    const DEFAULT_ACCOUNTS = [
      { id: 'Asad Amir', name: 'Asad Amir', role: 'superadmin', password: '0963249754' },
      { id: 'teacher1', name: 'أستاذ تجريبي', role: 'teacher', password: '1234' },
      { id: 'student1', name: 'طالب تجريبي', role: 'student', grade: 'الاول ابتدائي', password: '1234', completedLessons: [], teacherEvaluation: '' }
    ];

    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [appUser, setAppUser] = useState(null);
      const [view, setView] = useState('dashboard');
      const [notification, setNotification] = useState(null);
      const [confirmAction, setConfirmAction] = useState(null);

      const [users, setUsers] = useState([]);
      const [lessons, setLessons] = useState([]);
      const [messages, setMessages] = useState([]);
      const [quizzes, setQuizzes] = useState([]);
      const [loading, setLoading] = useState(true);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // تهيئة التوثيق (Authentication) للاتصال الآمن بقاعدة البيانات
      useEffect(() => {
        const initAuth = async () => { 
          try { 
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously(); 
            }
          } catch (e) { 
            console.log("Using offline mode", e); 
          } 
        };
        initAuth();
        const unsubAuth = auth.onAuthStateChanged(setFirebaseUser);
        return () => unsubAuth();
      }, []);

      useEffect(() => {
        // ننتظر حتى يتم توثيق المستخدم قبل جلب البيانات
        if (!firebaseUser && typeof __firebase_config !== 'undefined') return;

        const fallbackTimer = setTimeout(() => {
           if(loading) {
             setUsers(DEFAULT_ACCOUNTS);
             setLoading(false);
           }
        }, 2000);

        let unsubUsers = () => {}; let unsubLessons = () => {}; let unsubMessages = () => {}; let unsubQuizzes = () => {};

        try {
          unsubUsers = getPath('users').onSnapshot((snap) => {
            clearTimeout(fallbackTimer);
            const dbUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const mergedUsers = [...dbUsers];
            for (const acc of DEFAULT_ACCOUNTS) {
              if (!mergedUsers.find(x => x.id === acc.id)) mergedUsers.push(acc);
            }
            setUsers(mergedUsers);
            
            const savedUserId = localStorage.getItem('swiss_school_user_id');
            if (savedUserId) {
              const foundUser = mergedUsers.find(x => x.id === savedUserId);
              if (foundUser) setAppUser(foundUser);
            }
            setLoading(false);
          }, (err) => { 
            console.log("Users sync error", err);
            setUsers(DEFAULT_ACCOUNTS); setLoading(false); 
          });

          unsubLessons = getPath('lessons').onSnapshot((snap) => {
            setLessons(snap.docs.map(d => ({ dbId: d.id, ...d.data() })).sort((a,b) => b.createdAt - a.createdAt));
          }, (err) => console.log("Lessons sync error", err));

          unsubMessages = getPath('messages').onSnapshot((snap) => {
            setMessages(snap.docs.map(d => ({ dbId: d.id, ...d.data() })).sort((a,b) => a.createdAt - b.createdAt));
          }, (err) => console.log("Messages sync error", err));

          unsubQuizzes = getPath('quizzes').onSnapshot((snap) => {
            setQuizzes(snap.docs.map(d => ({ dbId: d.id, ...d.data() })).sort((a,b) => b.createdAt - a.createdAt));
          }, (err) => console.log("Quizzes sync error", err));
        } catch(e) {
          console.log("Database connection error", e);
          setUsers(DEFAULT_ACCOUNTS);
          setLoading(false);
        }

        return () => { unsubUsers(); unsubLessons(); unsubMessages(); unsubQuizzes(); clearTimeout(fallbackTimer); };
      }, [firebaseUser]);

      const handleLogin = (id, password) => {
        const u = users.find(x => x.id === id && x.password === password);
        if (u) {
          setAppUser(u);
          localStorage.setItem('swiss_school_user_id', u.id);
          setView('dashboard');
          showNotification(`أهلاً بك، ${u.name} ✨`);
        } else {
          showNotification("بيانات الدخول غير صحيحة.", "error");
        }
      };

      const handleRegisterStudent = async (id, password, grade) => {
        const u = users.find(x => x.id === id && x.role === 'student');
        if (u) {
          if (u.password) { showNotification("الحساب مفعل بالفعل، يرجى الدخول.", "error"); return; }
          try {
            await getPath('users').doc(id).set({ ...u, password, grade, status: 'active', completedLessons: [] }, {merge: true});
          } catch(e) {}
          const updatedUser = {...u, password, grade, status: 'active', completedLessons: []};
          setAppUser(updatedUser);
          localStorage.setItem('swiss_school_user_id', updatedUser.id);
          setView('dashboard');
          showNotification("مرحباً بك! تم التفعيل بنجاح 🎉");
        } else {
          showNotification("المعرف غير مسجل، راجع الإدارة.", "error");
        }
      };

      const logout = () => {
        setAppUser(null);
        localStorage.removeItem('swiss_school_user_id');
        setView('dashboard');
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-[#f0f4f8] flex items-center justify-center relative overflow-hidden">
            <div className="fixed top-[20%] left-[20%] w-[40vw] h-[40vw] bg-cyan-300 filter blur-[100px] opacity-40 liquid-bg-1"></div>
            <div className="relative z-10 w-20 h-20 border-4 border-cyan-200 border-t-cyan-500 rounded-full animate-spin"></div>
          </div>
        );
      }

      const renderView = () => {
        switch (view) {
          case 'dashboard': return <Dashboard user={appUser} users={users} lessons={lessons} />;
          case 'progress': return <ProgressDashboard users={users} lessons={lessons} user={appUser} showNotification={showNotification} />;
          case 'users': return <UsersManager users={users} showNotification={showNotification} setConfirmAction={setConfirmAction} />;
          case 'lessons': return <LessonsManager user={appUser} lessons={lessons} setConfirmAction={setConfirmAction} showNotification={showNotification} />;
          case 'chat': return <ChatRoom user={appUser} messages={messages} showNotification={showNotification} />;
          case 'quizzes': return <QuizzesManager user={appUser} quizzes={quizzes} showNotification={showNotification} />;
          default: return <Dashboard user={appUser} users={users} lessons={lessons} />;
        }
      };

      return (
        <div className="relative min-h-[100dvh] overflow-x-hidden font-sans">
          
          {/* Enhanced Notifications */}
          {notification && (
            <div className={`fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-4 rounded-2xl shadow-[0_20px_40px_rgba(0,0,0,0.15)] font-bold text-white transition-all animate-fade-in flex items-center gap-3 backdrop-blur-xl border ${notification.type === 'error' ? 'bg-red-500/80 border-red-400' : 'bg-emerald-500/80 border-emerald-400'}`}>
              {notification.type === 'error' ? <Icon name="settings" size={24} className="animate-spin-slow"/> : <Icon name="check-circle" size={24}/>}
              {notification.message}
            </div>
          )}

          {/* Liquid Glass Dynamic Backgrounds */}
          <div className="fixed top-[-15%] left-[-15%] w-[70vw] h-[70vw] max-w-[900px] max-h-[900px] bg-cyan-300 mix-blend-multiply filter blur-[140px] opacity-[0.35] pointer-events-none liquid-bg-1"></div>
          <div className="fixed top-[10%] right-[-15%] w-[60vw] h-[80vw] max-w-[800px] max-h-[1000px] bg-blue-300 mix-blend-multiply filter blur-[140px] opacity-[0.35] pointer-events-none liquid-bg-2"></div>
          <div className="fixed bottom-[-20%] left-[10%] w-[80vw] h-[60vw] max-w-[1000px] max-h-[800px] bg-emerald-200 mix-blend-multiply filter blur-[140px] opacity-[0.25] pointer-events-none liquid-bg-3"></div>

          {!appUser ? (
            <AuthScreen onLogin={handleLogin} onRegister={handleRegisterStudent} />
          ) : (
            <div className="flex h-[100dvh] relative z-10 p-3 md:p-6 gap-6 pb-24 md:pb-6">
              <div className="hidden md:block h-full">
                <Sidebar user={appUser} view={view} setView={setView} logout={logout} />
              </div>
              
              {/* FIXED SCROLLING ISSUE HERE: Added min-h-0, !overflow-y-auto and inline style */}
              <main className={`flex-1 min-h-0 ${glassContainer} !overflow-y-auto flex flex-col relative custom-scrollbar`} style={{ overflowY: 'auto', overflowX: 'hidden' }}>
                <div className="md:hidden flex items-center justify-between p-5 border-b border-white/20 bg-white/10 sticky top-0 z-20 backdrop-blur-xl">
                   <div className="flex items-center gap-4">
                     <div className="w-12 h-12 bg-gradient-to-tr from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-white font-black shadow-lg shadow-cyan-500/30 text-xl border border-white/40">
                       {appUser.name.charAt(0)}
                     </div>
                     <div>
                       <h2 className="font-black text-sm text-slate-800 leading-tight">{appUser.name}</h2>
                       <span className="text-[11px] font-bold text-cyan-700 uppercase tracking-wide">{getRoleName(appUser.role)}</span>
                     </div>
                   </div>
                   <button onClick={logout} className="p-3 text-slate-500 hover:text-red-500 bg-white/40 hover:bg-white rounded-2xl shadow-sm transition-all border border-white/50">
                     <Icon name="log-out" size={20} />
                   </button>
                </div>
                
                <div className="p-5 md:p-10 flex-1">
                  {renderView()}
                </div>
              </main>

              {/* Advanced Floating Mobile Bar */}
              <div className="md:hidden fixed bottom-6 left-4 right-4 bg-white/40 backdrop-blur-[30px] border border-white/50 shadow-[0_20px_40px_rgba(0,0,0,0.1)] z-50 px-2 py-3 rounded-3xl flex justify-around items-center glass-edge">
                <MobileNavItem id="dashboard" icon={<Icon name="layout-dashboard" />} label="الرئيسية" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'student', 'management']} role={appUser.role} />
                <MobileNavItem id="lessons" icon={<Icon name="layers" />} label="المواد" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'student']} role={appUser.role} />
                <MobileNavItem id="progress" icon={<Icon name="trending-up" />} label="التقييم" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'management']} role={appUser.role} />
                <MobileNavItem id="users" icon={<Icon name="users" />} label="الحسابات" currentView={view} setView={setView} allowed={['superadmin']} role={appUser.role} />
                <MobileNavItem id="chat" icon={<Icon name="message-circle" />} label="نقاش" currentView={view} setView={setView} allowed={['superadmin', 'teacher', 'management']} role={appUser.role} />
              </div>
            </div>
          )}

          {/* Fluid Confirm Modal */}
          {confirmAction && (
            <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-xl z-[100] flex items-center justify-center p-4 transition-all duration-500">
              <div className={`${glassContainer} p-10 max-w-sm w-full shadow-[0_30px_60px_rgba(0,0,0,0.2)] animate-fade-in`}>
                <div className="w-16 h-16 bg-red-100/80 rounded-2xl flex items-center justify-center mx-auto mb-6 text-red-500"><Icon name="alert-triangle" size={32}/></div>
                <h3 className="text-xl font-black text-slate-800 mb-8 text-center leading-relaxed">{confirmAction.message}</h3>
                <div className="flex gap-4">
                  <button className="flex-1 bg-gradient-to-r from-red-500 to-rose-500 hover:from-red-400 hover:to-rose-400 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hover:-translate-y-1" onClick={() => { confirmAction.onConfirm(); setConfirmAction(null); }}>نعم، تأكيد</button>
                  <button className="flex-1 bg-white/50 hover:bg-white text-slate-700 font-bold py-4 rounded-2xl transition-all shadow-sm border border-white/60" onClick={() => setConfirmAction(null)}>إلغاء</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function MobileNavItem({ id, icon, label, currentView, setView, allowed, role }) {
      if (!allowed.includes(role)) return null;
      const isActive = currentView === id;
      return (
        <button onClick={() => setView(id)} className={`relative flex flex-col items-center justify-center w-16 h-14 rounded-2xl transition-all duration-500 overflow-hidden ${isActive ? 'text-cyan-700' : 'text-slate-500 hover:text-cyan-500'}`}>
          {isActive && <div className="absolute inset-0 bg-gradient-to-b from-white/60 to-white/10 rounded-2xl -z-10 shadow-[inset_0_2px_4px_rgba(255,255,255,0.8)] border border-white/40"></div>}
          <div className={`mb-1 transition-all duration-500 flex items-center justify-center ${isActive ? 'scale-110 -translate-y-1 filter drop-shadow-md' : ''}`}>{icon}</div>
          <span className={`text-[10px] font-black transition-all duration-500 ${isActive ? 'opacity-100 transform translate-y-0' : 'opacity-0 translate-y-2 absolute bottom-0'}`}>{label}</span>
        </button>
      );
    }

    // ==========================================
    // AUTH SCREEN
    // ==========================================
    function AuthScreen({ onLogin, onRegister }) {
      const [isRegister, setIsRegister] = useState(false);
      const [id, setId] = useState('');
      const [password, setPassword] = useState('');
      const [grade, setGrade] = useState(GRADES[0]);

      return (
        <div className="min-h-[100dvh] flex items-center justify-center relative z-10 p-5 w-full">
          <div className={`${glassContainer} p-10 md:p-14 max-w-[460px] w-full relative animate-fade-in shadow-[0_30px_60px_rgba(0,0,0,0.1)]`}>
            
            <div className="text-center mb-10">
              <div className="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-gradient-to-tr from-white/90 to-white/30 mb-6 shadow-xl border border-white/80 transform rotate-3 hover:rotate-0 transition-transform duration-500 animate-float text-cyan-500 relative">
                <div className="absolute inset-0 rounded-[2rem] shadow-[inset_0_0_20px_rgba(255,255,255,0.8)] pointer-events-none"></div>
                <Icon name="graduation-cap" size={48} />
              </div>
              <h1 className="text-3xl md:text-4xl font-black fluid-gradient-text mb-3 tracking-tight">Swiss School</h1>
              <p className="text-slate-500 font-bold text-sm tracking-widest uppercase">البوابة التعليمية الذكية</p>
            </div>

            <div className="space-y-6">
              <div className="group relative z-20">
                <div className="relative flex items-center">
                  <span className="absolute right-5 text-slate-400 transition-colors duration-300 group-focus-within:text-cyan-500"><Icon name="user" size={22} /></span>
                  <input type="text" className={glassInputCls + " pr-14"} placeholder="رقم الهوية (ID)" value={id} onChange={e => setId(e.target.value)} />
                </div>
              </div>
              
              {isRegister && (
                <div className="group animate-fade-in relative z-10">
                  <div className="relative flex items-center">
                    <span className="absolute right-5 text-slate-400"><Icon name="layers" size={22} /></span>
                    <select className={glassInputCls + " pr-14 appearance-none"} value={grade} onChange={e => setGrade(e.target.value)}>
                      {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                    </select>
                    <span className="absolute left-5 text-slate-400 pointer-events-none"><Icon name="chevron-down" size={18}/></span>
                  </div>
                </div>
              )}

              <div className="group relative z-0">
                <div className="relative flex items-center">
                  <span className="absolute right-5 text-slate-400 transition-colors duration-300 group-focus-within:text-cyan-500"><Icon name="lock" size={22} /></span>
                  <input type="password" className={glassInputCls + " pr-14"} placeholder={isRegister ? "إنشاء كلمة مرور قوية" : "كلمة المرور"} value={password} onChange={e => setPassword(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') { isRegister ? onRegister(id, password, grade) : onLogin(id, password) } }}/>
                </div>
              </div>

              <button className={`${glassBtnPrimary} w-full mt-8 text-lg py-5 tracking-wide`} onClick={() => isRegister ? onRegister(id, password, grade) : onLogin(id, password)}>
                {isRegister ? 'تفعيل الحساب' : 'تسجيل الدخول'} <Icon name="arrow-left" size={20} />
              </button>
            </div>

            <div className="mt-8 text-center pt-6 border-t border-white/30">
              <button onClick={() => setIsRegister(!isRegister)} className="text-slate-500 font-bold hover:text-cyan-600 transition-colors w-full text-sm flex items-center justify-center gap-2">
                {isRegister ? 'لدي حساب بالفعل' : 'طالب جديد؟ تفعيل الحساب'}
              </button>
            </div>
          </div>
        </div>
      );
    }

                <div className="absolute inset-0 rounded-[2rem] shadow-[inset_0_0_20px_rgba(255,255,255,0.5)] pointer-events-none"></div>

              <h2 className="font-black text-slate-800 text-2xl tracking-tight leading-none mb-2">{user.name}</h2>

            <nav className="p-5 space-y-2 mt-2 custom-scrollbar overflow-y-auto h-[calc(100vh-360px)]">

                  <span className={`${view === item.id ? 'text-cyan-500' : 'text-slate-400'}`}>{item.icon}</span> {item.label}

          </div>
          
          <div className="p-5 bg-gradient-to-t from-white/40 to-transparent">
            <button onClick={logout} className="w-full flex items-center justify-center gap-3 bg-white/50 hover:bg-red-50 text-slate-600 hover:text-red-500 border border-white/60 py-4 rounded-2xl transition-all duration-300 font-bold shadow-sm hover:shadow-md"><Icon name="power" size={20} /> تسجيل خروج</button>
          </div>

    }

    // ==========================================
    // DASHBOARD VIEW
    // ==========================================

      const teachersCount = users.filter(u => u.role === 'teacher').length;
      const gradeLessons = lessons.filter(l => l.grade === user.grade);
      const totalLessons = gradeLessons.length;
      const completedLessons = (user.completedLessons || []).filter(id => gradeLessons.find(l => l.dbId === id)).length;
      const progressPercent = totalLessons === 0 ? 0 : Math.round((completedLessons / totalLessons) * 100);

      return (
        <div className="space-y-8 animate-fade-in pb-10">
          <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <h1 className="text-3xl md:text-5xl font-black text-slate-800 tracking-tight leading-tight">مرحباً، <br/><span className="fluid-gradient-text">{user.name}</span> ✨</h1>
              <p className="text-slate-500 mt-3 font-bold text-lg">نظرة عامة على يومك الدراسي.</p>
            </div>
          </header>

          {['superadmin', 'management'].includes(user.role) && (
            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
              <StatCard title="الطلاب" value={studentsCount} icon={<Icon name="users" size={32} />} bg="bg-blue-500 text-white" />
              <StatCard title="المعلمين" value={teachersCount} icon={<Icon name="shield" size={32} />} bg="bg-cyan-500 text-white" />
              <StatCard title="المقررات" value={lessons.length} icon={<Icon name="library" size={32} />} bg="bg-emerald-500 text-white" />
            </div>
          )}

          {user.role === 'student' && (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              {/* Progress Card */}
              <div className={`lg:col-span-5 ${glassContainer} p-8 flex flex-col justify-center relative`}>
                <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-400/20 rounded-full blur-3xl"></div>
                <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-slate-800"><div className="p-2 bg-emerald-100 text-emerald-500 rounded-xl"><Icon name="activity" size={24} /></div> الإنجاز العام</h3>
                
                <div className="flex items-end justify-between mb-4">
                  <div><span className="font-bold text-slate-400 text-sm">مكتمل</span><br/><span className="font-black text-slate-800 text-3xl">{completedLessons} <span className="text-lg text-slate-400">/ {totalLessons}</span></span></div>
                  <span className="font-black text-emerald-500 text-5xl">{progressPercent}%</span>
                </div>
                
                <div className="w-full bg-white/50 rounded-full h-4 shadow-[inset_0_2px_5px_rgba(0,0,0,0.05)] overflow-hidden">
                  <div className="bg-gradient-to-l from-emerald-400 to-teal-400 h-4 rounded-full transition-all duration-1000 ease-out relative" style={{ width: `${progressPercent}%` }}>
                     <div className="absolute inset-0 bg-white/20 w-full h-full animate-[translateX_2s_linear_infinite]"></div>
                  </div>
                </div>

                {user.teacherEvaluation && (
                  <div className="mt-8 p-5 bg-white/60 backdrop-blur-md border border-white/80 rounded-2xl relative shadow-sm">
                    <h4 className="font-black text-cyan-800 flex items-center gap-2 mb-2"><Icon name="edit-3" size={18} /> ملاحظات المدرس:</h4>
                    <p className="text-slate-700 font-bold leading-relaxed">{user.teacherEvaluation}</p>
                  </div>
                )}
              </div>

              {/* Recent Lessons */}
              <div className={`lg:col-span-7 ${glassContainer} p-8`}>
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-black flex items-center gap-3 text-slate-800"><div className="p-2 bg-cyan-100 text-cyan-600 rounded-xl"><Icon name="play-circle" size={24} /></div> أحدث الدروس</h3>
                </div>
                <ul className="space-y-4">
                  {gradeLessons.slice(0,4).map(l => {
                    const isCompleted = (user.completedLessons || []).includes(l.dbId);
                    return (
                      <li key={l.dbId} className={`flex items-center gap-4 bg-white/40 p-4 rounded-2xl border border-white/60 shadow-sm transition-all duration-300 hover:bg-white/60 ${isCompleted ? 'opacity-60' : ''}`}>
                        <div className={`p-3 rounded-xl shadow-inner bg-white flex items-center justify-center w-12 h-12 ${l.type === 'video' ? 'text-rose-500' : 'text-blue-500'}`}>{l.type === 'video' ? <Icon name="video" size={22} /> : <Icon name="file-text" size={22} />}</div>
                        <div className="flex flex-col">
                          <span className={`font-black text-lg ${isCompleted ? 'line-through text-slate-400' : 'text-slate-800'}`}>{l.title}</span>
                          <span className="text-[11px] font-bold text-slate-500 mt-1">{l.subject}</span>
                        </div>
                        {isCompleted && <span className="text-emerald-500 mr-auto"><Icon name="check-circle" size={24} /></span>}
                      </li>
                    );
                  })}
                  {gradeLessons.length === 0 && <div className="text-center p-8 bg-white/30 rounded-2xl border border-dashed border-cyan-300/50"><p className="text-cyan-800 font-bold text-lg">لم يتم تعيين دروس بعد.</p></div>}
                </ul>
              </div>
            </div>
          )}
          
          <div className="w-full rounded-[2.5rem] bg-gradient-to-r from-cyan-500 via-blue-600 to-indigo-600 relative overflow-hidden shadow-[0_20px_50px_-10px_rgba(6,182,212,0.4)] flex flex-col md:flex-row items-center p-10 md:p-14 gap-8 mt-10">
            <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
            <div className="relative z-10 text-white flex-1 text-center md:text-right">
              <h2 className="text-3xl md:text-4xl font-black mb-4 tracking-tight">مستقبل التعليم، اليوم.</h2>
              <p className="text-cyan-50 font-bold text-lg max-w-xl leading-relaxed opacity-90">بيئة تعلم ذكية مصممة خصيصاً لتعزيز الاستيعاب الأكاديمي.</p>
            </div>
            <div className="relative z-10 bg-white/10 p-6 rounded-[2rem] backdrop-blur-xl border border-white/20 hidden md:block shadow-[inset_0_0_20px_rgba(255,255,255,0.2)] text-white">
               <Icon name="rocket" size={64} className="drop-shadow-lg" />
            </div>
          </div>
        </div>
      );
    }

    function StatCard({ title, value, icon, bg }) {
      return (
        <div className={`${glassContainer} p-6 flex flex-row items-center gap-5 hover:scale-[1.02] transition-transform`}>
          <div className={`${bg} p-4 rounded-[1.5rem] shadow-lg w-16 h-16 flex items-center justify-center`}>{icon}</div>
          <div><p className="text-slate-500 font-bold text-xs tracking-wider mb-1">{title}</p><h3 className="text-4xl font-black text-slate-800">{value}</h3></div>
        </div>
      );
    }

    // ==========================================
    // LESSONS MANAGER
    // ==========================================
    function LessonsManager({ user, lessons, setConfirmAction, showNotification }) {
      const [form, setForm] = useState({ title: '', subject: '', link: '', type: 'video', grade: GRADES[0] });
      const [activeSubject, setActiveSubject] = useState(null); 

      const handleAddLesson = async (e) => {
        e.preventDefault();
        try {
          await getPath('lessons').add({ ...form, teacherId: user.id, teacherName: user.name, createdAt: Date.now() });
          setForm({ ...form, title: '', link: '' }); 
          showNotification("تم نشر المحتوى بنجاح");
        } catch(err) { showNotification("فشل النشر", "error"); }
      };

      const handleDelete = (id) => {
        setConfirmAction({ message: "تأكيد مسح المحتوى الدراسي؟", onConfirm: async () => { await getPath('lessons').doc(id).delete(); showNotification("تم المسح"); } });
      };

      const markLessonCompleted = async (lessonId) => {
        try {
          const currentCompleted = user.completedLessons || [];
          if (!currentCompleted.includes(lessonId)) {
            const newCompleted = [...currentCompleted, lessonId];
            if (user.id === 'student1') showNotification("تم الإكمال (وضع تجريبي)");
            else { await getPath('users').doc(user.id).update({ completedLessons: newCompleted }); showNotification("تم تأكيد حضورك!"); }
          }
        } catch (e) { showNotification("خطأ", "error"); }
      };

      const availableLessons = user.role === 'student' ? lessons.filter(l => l.grade === user.grade) : lessons;
      const subjects = [...new Set(availableLessons.map(l => l.subject))];

      return (
        <div className="space-y-8 pb-10 animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-blue-100 text-blue-600 rounded-xl"><Icon name="library" size={28} /></div> المكتبة الرقمية</h2>
          </div>

          {(user.role === 'teacher' || user.role === 'superadmin') && !activeSubject && (
            <form onSubmit={handleAddLesson} className={`${glassContainer} p-8 flex flex-col md:flex-row flex-wrap gap-5 items-end`}>
              <div className="w-full md:w-36"><label className="text-xs font-bold text-slate-500 mb-2 block">المادة (المجلد)</label><input type="text" required className={glassInputCls} value={form.subject} onChange={e=>setForm({...form, subject: e.target.value})}/></div>
              <div className="w-full md:flex-1 md:min-w-[180px]"><label className="text-xs font-bold text-slate-500 mb-2 block">عنوان الدرس</label><input type="text" required className={glassInputCls} value={form.title} onChange={e=>setForm({...form, title: e.target.value})}/></div>
              <div className="w-full md:w-32"><label className="text-xs font-bold text-slate-500 mb-2 block">النوع</label><select className={glassInputCls} value={form.type} onChange={e=>setForm({...form, type: e.target.value})}><option value="video">فيديو</option><option value="pdf">ملف</option></select></div>
              <div className="w-full md:w-40"><label className="text-xs font-bold text-slate-500 mb-2 block">الصف</label><select className={glassInputCls} value={form.grade} onChange={e=>setForm({...form, grade: e.target.value})}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select></div>
              <div className="w-full md:flex-1 md:min-w-[180px]"><label className="text-xs font-bold text-slate-500 mb-2 block">الرابط</label><input type="url" required className={glassInputCls} value={form.link} onChange={e=>setForm({...form, link: e.target.value})}/></div>
              <button type="submit" className={`${glassBtnPrimary} w-full md:w-auto h-[58px] px-6`}><Icon name="plus" size={24} /></button>
            </form>
          )}

          {!activeSubject ? (
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6 mt-8">
              {subjects.map(sub => {
                 const subCount = availableLessons.filter(l => l.subject === sub).length;
                 return (
                   <button key={sub} onClick={() => setActiveSubject(sub)} className={`${glassContainer} p-8 flex flex-col items-center justify-center gap-4 hover:-translate-y-2 transition-transform duration-300 group cursor-pointer`}>
                     <div className="w-20 h-20 bg-white border border-white/80 rounded-3xl flex items-center justify-center text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300 shadow-sm"><Icon name="folder" size={36} /></div>
                     <h3 className="font-black text-slate-800 text-lg text-center">{sub}</h3>
                     <span className="text-[11px] font-bold bg-slate-100 px-3 py-1 rounded-full text-slate-500">{subCount} محتوى</span>
                   </button>
                 )
              })}
              {subjects.length === 0 && <div className="col-span-full text-center py-20"><p className="text-slate-500 font-bold text-lg">المكتبة فارغة حالياً.</p></div>}
            </div>
          ) : (
            <div className="animate-fade-in space-y-6">
              <button onClick={() => setActiveSubject(null)} className="flex items-center gap-2 text-slate-600 font-bold bg-white/50 px-5 py-3 rounded-2xl hover:bg-white shadow-sm transition-all">
                <Icon name="arrow-right" size={20} /> العودة للمكتبة
              </button>
              <div className="bg-gradient-to-r from-blue-500 to-indigo-600 p-8 rounded-3xl text-white shadow-lg"><h3 className="text-3xl font-black">{activeSubject}</h3></div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {availableLessons.filter(l => l.subject === activeSubject).map(lesson => {
                  const isCompleted = user.role === 'student' && (user.completedLessons || []).includes(lesson.dbId);
                  return (
                    <div key={lesson.dbId} className={`${glassContainer} p-6 flex flex-col ${isCompleted ? 'opacity-70' : 'hover:-translate-y-1 hover:shadow-lg'} transition-all duration-300 group`}>
                      {user.role !== 'student' && (<button onClick={() => handleDelete(lesson.dbId)} className="absolute top-4 left-4 text-red-500 bg-white shadow-sm p-2 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity z-10 hover:bg-red-50"><Icon name="trash-2" size={18} /></button>)}
                      
                      <div className={`w-14 h-14 rounded-2xl mb-5 flex items-center justify-center shadow-md bg-white ${lesson.type === 'video' ? 'text-rose-500' : 'text-blue-500'}`}>{lesson.type === 'video' ? <Icon name="play" size={24} /> : <Icon name="file-text" size={24} />}</div>
                      <h4 className={`text-xl font-black mb-2 leading-snug ${isCompleted ? 'text-slate-500 line-through' : 'text-slate-800'}`}>{lesson.title}</h4>
                      <span className="text-xs font-bold text-slate-400 mb-6 block">موجه لـ {lesson.grade} | المدرس: {lesson.teacherName}</span>
                      
                      <div className="flex flex-col gap-3 mt-auto">
                        <a href={lesson.link} target="_blank" rel="noreferrer" className="w-full bg-white/60 hover:bg-white text-slate-800 font-bold py-3 rounded-xl transition-all shadow-sm border border-white/80 flex items-center justify-center gap-2">استعراض <Icon name="external-link" size={18} /></a>
                        {user.role === 'student' && (
                          <button onClick={() => markLessonCompleted(lesson.dbId)} disabled={isCompleted} className={`w-full text-center flex items-center justify-center gap-2 text-sm font-bold py-3 rounded-xl transition-all border ${isCompleted ? 'bg-emerald-100 text-emerald-600 border-emerald-200' : 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-md'}`}>
                            {isCompleted ? <><Icon name="check" size={18} /> مكتمل</> : 'أكد الحضور'}
                          </button>
                        )}
                      </div>
                    </div>
                  )
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // PROGRESS DASHBOARD
    // ==========================================
    function ProgressDashboard({ users, lessons, user, showNotification }) {
      const students = users.filter(u => u.role === 'student');
      const [selectedGrade, setSelectedGrade] = useState(GRADES[0]);
      const [editingEval, setEditingEval] = useState(null);
      const [evalText, setEvalText] = useState('');

      const filteredStudents = students.filter(s => s.grade === selectedGrade);
      const gradeLessonsCount = lessons.filter(l => l.grade === selectedGrade).length;

      const saveEvaluation = async (studentId) => {
        try {
          if(studentId === 'student1') showNotification("تم الحفظ (ذاكرة مؤقتة)");
          else { await getPath('users').doc(studentId).update({ teacherEvaluation: evalText }); showNotification("تم حفظ التقييم بنجاح"); }
          setEditingEval(null);
        } catch (e) { showNotification("حدث خطأ", "error"); }
      };

      return (
        <div className="space-y-8 pb-10 animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-emerald-100 text-emerald-500 rounded-xl"><Icon name="bar-chart" size={28} /></div> متابعة التقييم</h2>
            <select className={`${glassInputCls} md:w-64`} value={selectedGrade} onChange={e => setSelectedGrade(e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select>
          </div>

          <div className="grid grid-cols-1 gap-6">
            {filteredStudents.length === 0 ? (
              <div className="text-center py-20 bg-white/30 rounded-3xl border border-dashed border-slate-300"><p className="text-slate-500 font-bold text-lg">القسم فارغ حالياً.</p></div>
            ) : (
              filteredStudents.map(student => {
                const completed = (student.completedLessons || []).length;
                const pct = gradeLessonsCount === 0 ? 0 : Math.round((completed / gradeLessonsCount) * 100);
                return (
                  <div key={student.id} className={`${glassContainer} p-6 md:p-8 flex flex-col lg:flex-row gap-8 items-start lg:items-center`}>
                    <div className="w-full lg:w-1/4">
                       <div className="w-12 h-12 bg-cyan-100 text-cyan-600 rounded-full flex items-center justify-center font-black mb-3">{student.name.charAt(0)}</div>
                       <h3 className="text-xl font-black text-slate-800">{student.name}</h3>
                       <p className="text-xs font-bold text-slate-400 mt-1">ID: {student.id}</p>
                    </div>
                    
                    <div className="w-full lg:w-1/3 bg-white/50 p-6 rounded-2xl border border-white/60">
                      <div className="flex justify-between text-sm font-black mb-3"><span className="text-slate-500">الإنجاز: {completed}/{gradeLessonsCount}</span><span className={`${pct >= 80 ? 'text-emerald-500' : pct >= 50 ? 'text-blue-500' : 'text-orange-500'} text-xl`}>{pct}%</span></div>
                      <div className="w-full bg-slate-200/50 rounded-full h-3 overflow-hidden"><div className={`h-3 rounded-full transition-all duration-1000 ${pct >= 80 ? 'bg-emerald-400' : pct >= 50 ? 'bg-blue-400' : 'bg-orange-400'}`} style={{ width: `${pct}%` }}></div></div>
                    </div>
                    
                    <div className="w-full lg:flex-1 relative z-10">
                      {editingEval === student.id ? (
                        <div className="flex flex-col gap-3">
                          <textarea className={`${glassInputCls} h-24 resize-none`} placeholder="ملاحظات المدرس..." value={evalText} onChange={(e) => setEvalText(e.target.value)}></textarea>
                          <div className="flex gap-3"><button onClick={() => saveEvaluation(student.id)} className="flex-1 bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-md">حفظ</button><button onClick={() => setEditingEval(null)} className="flex-1 bg-white text-slate-600 font-bold py-3 rounded-xl border">إلغاء</button></div>
                        </div>
                      ) : (
                        <div className="bg-yellow-50/50 border border-yellow-100 p-5 rounded-2xl h-full flex flex-col justify-between">
                          <div className="mb-4"><span className="text-xs font-black text-yellow-800 mb-2 block"><Icon name="edit" size={14} className="inline"/> التقييم الأكاديمي:</span><p className="text-sm text-slate-700 font-bold leading-relaxed">{student.teacherEvaluation || "لا توجد ملاحظات."}</p></div>
                          {(user.role === 'teacher' || user.role === 'superadmin') && (<button onClick={() => { setEditingEval(student.id); setEvalText(student.teacherEvaluation || ''); }} className="text-xs font-bold text-yellow-700 hover:text-yellow-900 self-start bg-white px-3 py-1.5 rounded-lg shadow-sm border border-yellow-200">تعديل الملاحظة</button>)}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // USERS MANAGER
    // ==========================================
    function UsersManager({ users, showNotification, setConfirmAction }) {
      const [form, setForm] = useState({ id: '', name: '', role: 'student', grade: GRADES[0] });
      const [bulkText, setBulkText] = useState('');
      const [filterRole, setFilterRole] = useState('student');
      const [filterGrade, setFilterGrade] = useState(GRADES[0]);
      const [promoteFrom, setPromoteFrom] = useState(GRADES[0]);

      const roles = [{val: 'student', label: 'طالب'}, {val: 'teacher', label: 'معلم'}, {val: 'management', label: 'إدارة'}];

      const handleAddSingle = async (e) => {
        e.preventDefault();
        if (!form.id || !form.name) return;
        try {
          await getPath('users').doc(form.id).set({ id: form.id, name: form.name, role: form.role, grade: form.role === 'student' ? form.grade : null, password: '', status: 'pending', completedLessons: [], teacherEvaluation: '', createdAt: Date.now() });
          setForm({ id: '', name: '', role: 'student', grade: GRADES[0] });
          showNotification("تم إنشاء الحساب");
        } catch (err) { showNotification("خطأ", "error"); }
      };

      const handleBulkAdd = async () => {
        if (!bulkText.trim()) return;
        const lines = bulkText.split('\n');
        let count = 0;
        try {
          await Promise.all(lines.map(async line => {
            if (!line.trim()) return;
            const parts = line.split(',');
            if (parts.length >= 2) {
              const id = parts[0].trim(), name = parts[1].trim(), grade = parts[2] ? parts[2].trim() : form.grade;
              await getPath('users').doc(id).set({ id, name, role: 'student', grade, password: '', status: 'pending', completedLessons: [], teacherEvaluation: '', createdAt: Date.now() });
              count++;
            }
          }));
          setBulkText(''); showNotification(`تم تسجيل ${count} مستخدم`);
        } catch(e) { showNotification("خطأ", "error"); }
      };

      const handleDelete = (id) => {
        if (id === 'Asad Amir' || id === 'teacher1' || id === 'student1') return showNotification("محمي من الحذف", "error");
        setConfirmAction({ message: "حذف نهائي؟", onConfirm: async () => { await getPath('users').doc(id).delete(); showNotification("تم الحذف"); } });
      };

      const handleUpdateStudentGrade = async (id, newGrade) => {
        try { await getPath('users').doc(id).update({ grade: newGrade }); showNotification("تم النقل"); } catch(e) {}
      };

      const handleBulkPromote = async () => {
        const currentIndex = GRADES.indexOf(promoteFrom);
        if (currentIndex === GRADES.length - 1) return showNotification("هذا الصف النهائي", "error");
        const nextGrade = GRADES[currentIndex + 1];
        const studentsToPromote = users.filter(u => u.role === 'student' && u.grade === promoteFrom);
        if (studentsToPromote.length === 0) return showNotification("فارغ", "error");
        
        setConfirmAction({
          message: `ترقية ${studentsToPromote.length} طالب إلى ${nextGrade}؟`,
          onConfirm: async () => {
            try {
              await Promise.all(studentsToPromote.map(s => getPath('users').doc(s.id).update({ grade: nextGrade })));
              showNotification(`تمت الترقية`);
            } catch(e) {}
          }
        });
      };

      const filteredUsers = users.filter(u => {
        if (filterRole === 'student') return u.role === 'student' && u.grade === filterGrade;
        return u.role === filterRole;
      });

      return (
        <div className="space-y-8 pb-10 animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-5">
             <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><Icon name="users" size={28} /></div> إدارة المنظومة</h2>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
            <div className={`${glassContainer} p-8`}>
              <h3 className="text-xl font-black mb-6 text-slate-800">إضافة مستخدم جديد</h3>
              <form onSubmit={handleAddSingle} className="space-y-5">
                <input type="text" placeholder="المعرف (ID)" className={glassInputCls} value={form.id} onChange={e=>setForm({...form, id: e.target.value})} required/>
                <input type="text" placeholder="الاسم" className={glassInputCls} value={form.name} onChange={e=>setForm({...form, name: e.target.value})} required/>
                <div className="flex gap-4">
                  <select className={glassInputCls} value={form.role} onChange={e=>setForm({...form, role: e.target.value})}>{roles.map(r => <option key={r.val} value={r.val}>{r.label}</option>)}</select>
                  {form.role === 'student' && <select className={glassInputCls} value={form.grade} onChange={e=>setForm({...form, grade: e.target.value})}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select>}
                </div>
                <button type="submit" className={`${glassBtnPrimary} w-full mt-4`}>حفظ</button>
              </form>
            </div>

            <div className="flex flex-col gap-8">
              <div className={`${glassContainer} p-8 bg-gradient-to-br from-indigo-50/50 to-transparent`}>
                <h3 className="text-xl font-black mb-4 text-indigo-800">ترقية فصل شاملة</h3>
                <div className="flex flex-col md:flex-row gap-4 items-end">
                  <div className="flex-1 w-full"><select className={glassInputCls} value={promoteFrom} onChange={e=>setPromoteFrom(e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select></div>
                  <button onClick={handleBulkPromote} className="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold h-[56px] px-8 rounded-2xl shadow-lg transition-colors">نفذ</button>
                </div>
              </div>
              
              <div className={`${glassContainer} p-8`}>
                <h3 className="text-xl font-black mb-4 text-slate-800">استيراد CSV</h3>
                <textarea className={`${glassInputCls} h-24 resize-none`} placeholder="الهوية, الاسم, الصف" value={bulkText} onChange={e => setBulkText(e.target.value)}></textarea>
                <button onClick={handleBulkAdd} className="w-full mt-4 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-2xl shadow-md transition-colors">استيراد</button>
              </div>
            </div>
          </div>

          <div className={`${glassContainer} p-6 overflow-hidden flex flex-col`}>
            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-5 bg-white/40 p-4 rounded-2xl border border-white/60">
               <div className="flex gap-3 w-full md:w-auto">
                 <select className={`${glassInputCls} py-2`} value={filterRole} onChange={e=>setFilterRole(e.target.value)}>{roles.map(r => <option key={r.val} value={r.val}>{r.label}</option>)}</select>
                 {filterRole === 'student' && (<select className={`${glassInputCls} py-2`} value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select>)}
               </div>
            </div>
            
            <div className="overflow-x-auto rounded-2xl border border-white/50 bg-white/20">
              <table className="w-full text-right border-collapse min-w-[700px]">
                <thead>
                  <tr className="bg-slate-800 text-white">
                    <th className="p-5 text-sm font-bold">ID</th><th className="p-5 text-sm font-bold">الاسم</th><th className="p-5 text-sm font-bold">القسم</th><th className="p-5 text-sm font-bold">المرور</th><th className="p-5 text-sm font-bold text-center">إجراء</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredUsers.length === 0 ? (<tr><td colSpan="5" className="p-10 text-center text-slate-500 font-bold">فارغ</td></tr>) : 
                    filteredUsers.map(u => (
                    <tr key={u.id} className="border-b border-white/40 hover:bg-white/60">
                      <td className="p-5 font-bold text-slate-500">{u.id}</td>
                      <td className="p-5 font-black text-slate-800">{u.name}</td>
                      <td className="p-5">{u.role === 'student' ? (<select className="bg-white/60 border border-white rounded-lg px-2 py-1 text-sm font-bold outline-none" value={u.grade} onChange={(e) => handleUpdateStudentGrade(u.id, e.target.value)}>{GRADES.map(g => <option key={g} value={g}>{g}</option>)}</select>) : ( <span className="text-xs bg-slate-200 font-bold px-2 py-1 rounded">{getRoleName(u.role)}</span> )}</td>
                      <td className="p-5 text-red-500 font-bold text-sm">{u.password || '-'}</td>
                      <td className="p-5 text-center"><button onClick={() => handleDelete(u.id)} className="text-red-500 bg-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm border border-red-100">حذف</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // QUIZZES
    // ==========================================
    function QuizzesManager({ user, quizzes, showNotification }) {
      const [form, setForm] = useState({ title: '', grade: GRADES[0], question: '', options: '', answer: '' });
      const handleAdd = async (e) => {
        e.preventDefault();
        try { await getPath('quizzes').add({ ...form, teacherName: user.name, options: form.options.split(','), createdAt: Date.now() }); setForm({...form, title:'', question:'', options:'', answer:''}); showNotification("نُشر"); } catch(err) {}
      };
      const filteredQuizzes = user.role === 'student' ? quizzes.filter(q => q.grade === user.grade) : quizzes;
      return (
        <div className="space-y-8 pb-10 animate-fade-in">
          <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-orange-100 text-orange-600 rounded-xl"><Icon name="help-circle" size={28} /></div> الاختبارات</h2>
          {user.role === 'teacher' && (
            <form onSubmit={handleAdd} className={`${glassContainer} p-8 space-y-5`}><div className="flex gap-4"><input className={glassInputCls} placeholder="العنوان" required value={form.title} onChange={e=>setForm({...form, title:e.target.value})}/><select className={glassInputCls} value={form.grade} onChange={e=>setForm({...form, grade:e.target.value})}>{GRADES.map(g=><option key={g} value={g}>{g}</option>)}</select></div><input className={glassInputCls} placeholder="السؤال" required value={form.question} onChange={e=>setForm({...form, question:e.target.value})}/><div className="flex gap-4"><input className={glassInputCls} placeholder="الخيارات (بفاصلة)" required value={form.options} onChange={e=>setForm({...form, options:e.target.value})}/><input className={glassInputCls} placeholder="الإجابة" required value={form.answer} onChange={e=>setForm({...form, answer:e.target.value})}/></div><button className={glassBtnPrimary + " w-full mt-4"}>نشر</button></form>
          )}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {filteredQuizzes.map(q => (
              <div key={q.dbId} className={`${glassContainer} p-8 flex flex-col`}><h3 className="text-xl font-black mb-1">{q.title}</h3><span className="text-xs text-slate-500 font-bold mb-5">{q.grade} | {q.teacherName}</span><div className="bg-white/50 p-6 rounded-2xl flex-1"><p className="font-bold text-lg mb-4">{q.question}</p><div className="space-y-2">{q.options && q.options.map((opt,i)=>(<label key={i} className="flex gap-3 bg-white/70 p-3 rounded-xl border border-white cursor-pointer hover:border-cyan-400"><input type="radio" name={q.dbId} className="w-4 h-4"/><span className="font-bold text-sm text-slate-700">{opt}</span></label>))}</div></div>{user.role === 'student' && <button className="mt-4 bg-slate-800 text-white font-bold py-3 rounded-xl w-full" onClick={()=>showNotification("تم الاستلام")}>تسليم</button>}</div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // CHAT ROOM
    // ==========================================
    function ChatRoom({ user, messages }) {
      const [text, setText] = useState(''); const bottomRef = useRef(null);
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
      const handleSend = async (e) => { e.preventDefault(); if (!text.trim()) return; const t=text; setText(''); try{ if(messages.length>=50) await Promise.all(messages.slice(0, messages.length-49).map(m=>getPath('messages').doc(m.dbId).delete())); await getPath('messages').add({ text:t, senderId:user.id, senderName:user.name, senderRole:user.role, createdAt:Date.now() }); } catch(e){} };
      return (
        <div className="h-[calc(100vh-140px)] md:h-[calc(100vh-100px)] flex flex-col pb-safe animate-fade-in">
          <div className="mb-5 flex justify-between items-center"><h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><div className="p-2 bg-purple-100 text-purple-600 rounded-xl"><Icon name="message-circle" size={28} /></div> النقاش</h2><span className="text-xs font-bold bg-white/60 px-3 py-1 rounded-full">{messages.length}/50</span></div>
          {/* FIXED SCROLLING ISSUE HERE: Added min-h-0, !overflow-y-auto and inline style */}
          <div className={`${glassContainer} flex-1 min-h-0 !overflow-y-auto p-6 space-y-6 flex flex-col mb-5 custom-scrollbar bg-white/30`} style={{ overflowY: 'auto', overflowX: 'hidden' }}>
            {messages.length === 0 ? <div className="m-auto font-bold text-slate-400">لا رسائل</div> : messages.map(msg => { const isMe = msg.senderId === user.id; return (<div key={msg.dbId} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}><span className="text-[10px] font-bold text-slate-400 mb-1 mx-2">{msg.senderName}</span><div className={`px-5 py-3.5 rounded-2xl max-w-[80%] shadow-sm text-sm font-bold leading-relaxed ${isMe ? 'bg-cyan-500 text-white rounded-tr-sm' : 'bg-white text-slate-800 rounded-tl-sm border'}`}>{msg.text}</div></div>) })}
            <div ref={bottomRef} />
          </div>
          <form onSubmit={handleSend} className="flex gap-3 relative"><input type="text" className={`${glassInputCls} pr-16 bg-white/80`} placeholder="تحدث..." value={text} onChange={e=>setText(e.target.value)} /><button type="submit" className="absolute left-2 top-2 bottom-2 bg-slate-800 text-white rounded-xl w-14 flex items-center justify-center hover:bg-slate-700 transition-colors"><Icon name="send" size={20} className="rtl:rotate-180"/></button></form>
        </div>
      );
    }

    function getRoleName(r) { switch(r) { case 'superadmin': return 'المدير'; case 'management': return 'الإدارة'; case 'teacher': return 'المعلم'; case 'student': return 'الطالب'; default: return r; } }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
